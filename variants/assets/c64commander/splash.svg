<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
    <title id="title">C64 Commander splash</title>
    <desc id="desc">C64 Commander splash screen with centered wordmark on blue gradient.</desc>
    <defs>
        <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0%" stop-color="#90A2D4" />
            <stop offset="100%" stop-color="#4C5E98" />
        </linearGradient>
    </defs>
    <rect width="1600" height="900" fill="url(#bg)" />
    <circle cx="280" cy="180" r="120" fill="#FFFFFF" fill-opacity="0.08" />
    <circle cx="1350" cy="720" r="170" fill="#111827" fill-opacity="0.14" />
    <image href="logo.svg" x="250" y="250" width="1100" height="367" preserveAspectRatio="xMidYMid meet" />
</svg>
