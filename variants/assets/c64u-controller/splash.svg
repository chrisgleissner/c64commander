<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
    <title id="title">C64U Controller splash</title>
    <desc id="desc">C64U Controller splash screen with centered wordmark on teal gradient.</desc>
    <defs>
        <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0%" stop-color="#5A9CBD" />
            <stop offset="100%" stop-color="#184D66" />
        </linearGradient>
    </defs>
    <rect width="1600" height="900" fill="url(#bg)" />
    <circle cx="1320" cy="170" r="150" fill="#FFFFFF" fill-opacity="0.08" />
    <circle cx="220" cy="720" r="180" fill="#081A22" fill-opacity="0.12" />
    <image href="logo.svg" x="220" y="250" width="1160" height="367" preserveAspectRatio="xMidYMid meet" />
</svg>
