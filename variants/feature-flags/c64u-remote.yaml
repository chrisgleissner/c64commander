# Feature-flag overrides for the C64U Remote variant.
#
# C64U Remote is a focused, stable, local remote-control app for compact,
# keypad-first Android devices (small screen, no Google Play Services,
# background-restricted host).
#
# CommoServe, background execution, RAM snapshots, keypad input, and the most
# important power-related Telnet actions remain enabled for this variant. HVSC
# and the remaining Telnet-backed Home actions are visible so users can tune the
# remote-control surface from Settings.
#
# Features excluded from this variant are BOTH disabled (enabled: false) AND
# hidden from the normal-user Settings (visible_to_user: false). With
# visible_to_user: false a feature is not shown in standard Settings and is not
# user-editable, so a persisted user override / stale local storage cannot
# re-enable it. Because the variant override is merged into the feature
# definition at build time (baked into src/generated/variant.ts) it takes effect
# before any runtime override.
#
# This keeps the excluded features absent from navigation, Home cards, action
# panels, dialogs, settings toggles, and any direct-route/deep-link surface,
# since all of these are gated on the same feature flags.
overrides:
  hvsc_enabled:
    enabled: false
    visible_to_user: true
  demo_mode_enabled:
    enabled: false
    visible_to_user: false

  background_execution_enabled:
    enabled: true
    visible_to_user: true
    developer_only: false
  lighting_studio_enabled:
    enabled: false
    visible_to_user: false
  remote_input_enabled:
    enabled: false
    visible_to_user: false
  home_telnet_reu_snapshot_enabled:
    enabled: false
    visible_to_user: false
  home_telnet_config_actions_enabled:
    enabled: false
    visible_to_user: true
  home_telnet_drive_actions_enabled:
    enabled: false
    visible_to_user: true
  home_telnet_printer_actions_enabled:
    enabled: false
    visible_to_user: true
  home_telnet_power_cycle_enabled:
    enabled: true
    visible_to_user: true
  home_telnet_clear_ram_reboot_enabled:
    enabled: true
    visible_to_user: true
