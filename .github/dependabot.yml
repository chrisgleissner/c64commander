version: 2

multi-ecosystem-groups:
  all-dependencies:
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
    labels:
      - dependencies

updates:
  - package-ecosystem: npm
    directory: /
    multi-ecosystem-group: all-dependencies
    patterns:
      - "*"
    open-pull-requests-limit: 1
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    multi-ecosystem-group: all-dependencies
    patterns:
      - "*"
    open-pull-requests-limit: 1
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: gradle
    directory: /android
    multi-ecosystem-group: all-dependencies
    patterns:
      - "*"
    open-pull-requests-limit: 1
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
