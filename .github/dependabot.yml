version: 2

multi-ecosystem-groups:
  routine-updates:
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
    labels:
      - dependencies

updates:
  - package-ecosystem: npm
    directory: /
    multi-ecosystem-group: routine-updates
    patterns:
      - "*"
    open-pull-requests-limit: 1
    groups:
      routine-updates:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    multi-ecosystem-group: routine-updates
    patterns:
      - "*"
    open-pull-requests-limit: 1
    ignore:
      - dependency-name: actions/setup-python
        versions:
          - "6"
          - "6.x"
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: gradle
    directory: /android
    multi-ecosystem-group: routine-updates
    patterns:
      - "*"
    open-pull-requests-limit: 1
    groups:
      routine-updates:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
