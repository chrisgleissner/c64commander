version: 2

multi-ecosystem-groups:
  weekly-rollup:
    schedule:
      interval: weekly
      day: friday
      time: "06:00"
      timezone: UTC
    commit-message:
      prefix: deps
    labels:
      - dependencies
    open-pull-requests-limit: 1

updates:
  - package-ecosystem: npm
    directory: /
    multi-ecosystem-group: weekly-rollup
    patterns:
      - "*"
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    multi-ecosystem-group: weekly-rollup
    patterns:
      - "*"
    ignore:
      - dependency-name: actions/setup-python
        versions:
          - "6"
          - "6.x"
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: gradle
    directory: /android
    multi-ecosystem-group: weekly-rollup
    patterns:
      - "*"
    ignore:
      # kotlinx-coroutines-test 1.9+ resolves Kotlin 2.2 stdlib metadata, but the
      # Android build is still compiled with Kotlin 1.9.x. Keep this pinned until
      # the toolchain is upgraded intentionally.
      - dependency-name: org.jetbrains.kotlinx:kotlinx-coroutines-test
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
