version: 2

multi-ecosystem-groups:
  weekly-rollup:
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    commit-message:
      prefix: deps
    labels:
      - dependencies

updates:
  - package-ecosystem: npm
    directory: /
    multi-ecosystem-group: weekly-rollup
    patterns:
      - "*"
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 1
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    multi-ecosystem-group: weekly-rollup
    patterns:
      - "*"
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 1
    ignore:
      - dependency-name: actions/setup-python
        versions:
          - "6"
          - "6.x"
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: gradle
    directory: /android
    multi-ecosystem-group: weekly-rollup
    patterns:
      - "*"
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 1
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
