version: 2

multi-ecosystem-groups:
  all-dependencies:
    schedule:
      interval: weekly

updates:
  - package-ecosystem: npm
    directory: /
    multi-ecosystem-group: all-dependencies
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    groups:
      all-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: deps
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: /
    multi-ecosystem-group: all-dependencies
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    groups:
      all-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: ci
    labels:
      - dependencies
      - ci

  - package-ecosystem: gradle
    directory: /android
    multi-ecosystem-group: all-dependencies
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    groups:
      all-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: android
    labels:
      - dependencies
      - android
