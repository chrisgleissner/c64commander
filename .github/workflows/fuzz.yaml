          code_file="$TELEMETRY_OUTPUT_DIR/monitor.exitcode"
          if [[ ! -f "$csv" ]]; then
            echo "telemetry gate failed: missing $csv" >&2
            exit 1
          fi
          line_count="$(wc -l < "$csv")"
          if [[ "$line_count" -le 1 ]]; then
            echo "telemetry gate failed: empty CSV ($line_count lines)" >&2
            exit 1
          fi
          if [[ ! -f "$code_file" ]]; then
            echo "telemetry gate failed: monitor exit code missing" >&2
            exit 1
          fi
          code="$(cat "$code_file")"
          if [[ "$code" == "3" ]]; then
            echo "telemetry note: target process exited normally (expected for fuzz test completion)"
          elif [[ "$code" != "0" ]]; then
            echo "telemetry gate failed: monitor exited with code $code" >&2
            exit 1
          fi
          echo "telemetry gates passed: $line_count samples, monitor exit code $code"
