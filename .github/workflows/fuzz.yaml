name: fuzz

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      time_budget:
        description: "Fuzz time budget for manual runs (default 5m)"
        required: false
        default: "5m"
      seed:
        description: "Fixed seed for deterministic reproduction (leave blank for random)"
        required: false

jobs:
  fuzz-deterministic:
    name: Fuzz Test (Deterministic Seed)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: fuzz-det-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install ffmpeg tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json', 'bun.lockb') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start telemetry monitor
        env:
          TELEMETRY_OUTPUT_DIR: ci-artifacts/telemetry/fuzz-deterministic
          TELEMETRY_INTERVAL_SEC: "1"
          TELEMETRY_PROCESS_MATCH: node .*scripts/run-fuzz\.mjs
          TELEMETRY_PLATFORM: fuzz-deterministic
        run: |
          mkdir -p "$TELEMETRY_OUTPUT_DIR"
          (
            status=0
            code_file="$TELEMETRY_OUTPUT_DIR/monitor.exitcode"
            wrote_code=0
            write_code_file() {
              if [[ "$wrote_code" == "0" ]]; then
                echo "$1" > "$code_file"
                wrote_code=1
              fi
            }
            trap 'write_code_file "$status"' EXIT
            bash ci/telemetry/linux/monitor_linux.sh >"$TELEMETRY_OUTPUT_DIR/monitor.log" 2>&1 &
            monitor_child_pid=$!
            echo "$monitor_child_pid" > "$TELEMETRY_OUTPUT_DIR/monitor.child.pid"
            wait "$monitor_child_pid" || status=$?
            write_code_file "$status"
          ) &
          echo $! > "$TELEMETRY_OUTPUT_DIR/monitor.pid"
          sleep 2
          if ! kill -0 "$(cat "$TELEMETRY_OUTPUT_DIR/monitor.pid")" 2>/dev/null; then
            echo "telemetry monitor failed to start" >&2
            cat "$TELEMETRY_OUTPUT_DIR/monitor.log" >&2 || true
            exit 1
          fi

      - name: Run fuzz test (deterministic)
        env:
          FUZZ_RUN_MODE: ci
          VITE_FUZZ_MODE: "1"
        run: |
          node scripts/run-fuzz.mjs --fuzz-seed 4242 --fuzz-time-budget 5m --fuzz-concurrency 1 --fuzz-platform android-phone

      - name: Stop telemetry monitor
        if: always()
        env:
          TELEMETRY_OUTPUT_DIR: ci-artifacts/telemetry/fuzz-deterministic
        run: |
          set -euo pipefail
          pid=""
          child_pid=""
          if [[ -f "$TELEMETRY_OUTPUT_DIR/monitor.child.pid" ]]; then
            child_pid="$(cat "$TELEMETRY_OUTPUT_DIR/monitor.child.pid")"
          fi
          if [[ -f "$TELEMETRY_OUTPUT_DIR/monitor.pid" ]]; then
            pid="$(cat "$TELEMETRY_OUTPUT_DIR/monitor.pid")"
            if [[ -n "$child_pid" ]]; then
              kill -TERM "$child_pid" 2>/dev/null || true
            else
              kill -TERM "$pid" 2>/dev/null || true
            fi
            for i in $(seq 1 20); do
              if [[ -f "$TELEMETRY_OUTPUT_DIR/monitor.exitcode" ]]; then
                break
              fi
              sleep 1
            done
            if [[ -n "$child_pid" ]] && kill -0 "$child_pid" 2>/dev/null; then
              kill -KILL "$child_pid" 2>/dev/null || true
            fi
            if kill -0 "$pid" 2>/dev/null; then
              kill -KILL "$pid" 2>/dev/null || true
            fi
            for i in $(seq 1 10); do
              if [[ -f "$TELEMETRY_OUTPUT_DIR/monitor.exitcode" ]]; then
                break
              fi
              sleep 1
            done
          fi
          if [[ ! -f "$TELEMETRY_OUTPUT_DIR/monitor.exitcode" ]]; then
            if [[ -n "$child_pid" ]] && kill -0 "$child_pid" 2>/dev/null; then
              :
            elif [[ -n "$pid" ]] && kill -0 "$pid" 2>/dev/null; then
              :
            else
              echo "1" > "$TELEMETRY_OUTPUT_DIR/monitor.exitcode"
              echo "telemetry(fuzz-deterministic): synthesized monitor.exitcode=1 because wrapper exited before writing status" >&2
            fi
          fi

      - name: Summarize telemetry
        if: always()
        env:
          TELEMETRY_SUMMARY_DIR: ci-artifacts/telemetry/fuzz-deterministic
          TELEMETRY_SUMMARY_OUT_JSON: ci-artifacts/telemetry/fuzz-deterministic/summary.json
          TELEMETRY_SUMMARY_OUT_MD: ci-artifacts/telemetry/fuzz-deterministic/summary.md
        run: |
          python3 ci/telemetry/summarize_metrics.py

      - name: Render telemetry charts
        if: always()
        env:
          TELEMETRY_SUMMARY_DIR: ci-artifacts/telemetry/fuzz-deterministic
        run: |
          python3 ci/telemetry/render_charts.py

      - name: Upload fuzz artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-deterministic-artifacts
          path: |
            test-results/fuzz/**
            ci-artifacts/telemetry/fuzz-deterministic/metrics.csv
            ci-artifacts/telemetry/fuzz-deterministic/events.log
            ci-artifacts/telemetry/fuzz-deterministic/metadata.json
            ci-artifacts/telemetry/fuzz-deterministic/monitor.log
            ci-artifacts/telemetry/fuzz-deterministic/monitor.exitcode
            ci-artifacts/telemetry/fuzz-deterministic/summary.json
            ci-artifacts/telemetry/fuzz-deterministic/summary.md
            ci-artifacts/telemetry/fuzz-deterministic/charts/**

      - name: Telemetry gates
        if: always()
        env:
          TELEMETRY_OUTPUT_DIR: ci-artifacts/telemetry/fuzz-deterministic
        run: |
          csv="$TELEMETRY_OUTPUT_DIR/metrics.csv"
          code_file="$TELEMETRY_OUTPUT_DIR/monitor.exitcode"
          if [[ ! -f "$csv" ]]; then
            echo "telemetry gate failed: missing $csv" >&2
            exit 1
          fi
          line_count="$(wc -l < "$csv")"
          if [[ "$line_count" -le 1 ]]; then
            echo "telemetry gate failed: empty CSV ($line_count lines)" >&2
            exit 1
          fi
          if [[ ! -f "$code_file" ]]; then
            echo "telemetry gate failed: monitor exit code missing" >&2
            exit 1
          fi
          code="$(cat "$code_file")"
          if [[ "$code" == "3" ]]; then
            echo "telemetry note: target process exited normally (expected for fuzz test completion)"
          elif [[ "$code" != "0" ]]; then
            echo "telemetry gate failed: monitor exited with code $code" >&2
            exit 1
          fi
          echo "telemetry gates passed: $line_count samples, monitor exit code $code"

  fuzz:
    name: Fuzz Test (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 150
    concurrency:
      group: fuzz-test-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install ffmpeg tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json', 'bun.lockb') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start telemetry monitor
        env:
          TELEMETRY_OUTPUT_DIR: ci-artifacts/telemetry/fuzz
          TELEMETRY_INTERVAL_SEC: "1"
          TELEMETRY_PROCESS_MATCH: node .*scripts/run-fuzz\.mjs
          TELEMETRY_PLATFORM: fuzz
        run: |
          mkdir -p "$TELEMETRY_OUTPUT_DIR"
          (
            status=0
            code_file="$TELEMETRY_OUTPUT_DIR/monitor.exitcode"
            wrote_code=0
            write_code_file() {
              if [[ "$wrote_code" == "0" ]]; then
                echo "$1" > "$code_file"
                wrote_code=1
              fi
            }
            trap 'write_code_file "$status"' EXIT
            bash ci/telemetry/linux/monitor_linux.sh >"$TELEMETRY_OUTPUT_DIR/monitor.log" 2>&1 &
            monitor_child_pid=$!
            echo "$monitor_child_pid" > "$TELEMETRY_OUTPUT_DIR/monitor.child.pid"
            wait "$monitor_child_pid" || status=$?
            write_code_file "$status"
          ) &
          echo $! > "$TELEMETRY_OUTPUT_DIR/monitor.pid"
          sleep 2
          if ! kill -0 "$(cat "$TELEMETRY_OUTPUT_DIR/monitor.pid")" 2>/dev/null; then
            echo "telemetry monitor failed to start" >&2
            cat "$TELEMETRY_OUTPUT_DIR/monitor.log" >&2 || true
            exit 1
          fi

      - name: Run fuzz test
        env:
          FUZZ_RUN_MODE: ci
          VITE_FUZZ_MODE: "1"
        run: |
          SEED=${{ inputs.seed || github.run_id }}
          if [[ "${GITHUB_EVENT_NAME}" == "schedule" ]]; then
            TIME_BUDGET="2h"
          else
            TIME_BUDGET="${{ github.event.inputs.time_budget || '5m' }}"
          fi
          node scripts/run-fuzz.mjs --fuzz-seed "$SEED" --fuzz-time-budget "$TIME_BUDGET" --fuzz-concurrency 2 --fuzz-platform android-phone

      - name: Stop telemetry monitor
        if: always()
        env:
          TELEMETRY_OUTPUT_DIR: ci-artifacts/telemetry/fuzz
        run: |
          set -euo pipefail
          pid=""
          child_pid=""
          if [[ -f "$TELEMETRY_OUTPUT_DIR/monitor.child.pid" ]]; then
            child_pid="$(cat "$TELEMETRY_OUTPUT_DIR/monitor.child.pid")"
          fi
          if [[ -f "$TELEMETRY_OUTPUT_DIR/monitor.pid" ]]; then
            pid="$(cat "$TELEMETRY_OUTPUT_DIR/monitor.pid")"
            if [[ -n "$child_pid" ]]; then
              kill -TERM "$child_pid" 2>/dev/null || true
            else
              kill -TERM "$pid" 2>/dev/null || true
            fi
            for i in $(seq 1 20); do
              if [[ -f "$TELEMETRY_OUTPUT_DIR/monitor.exitcode" ]]; then
                break
              fi
              sleep 1
            done
            if [[ -n "$child_pid" ]] && kill -0 "$child_pid" 2>/dev/null; then
              kill -KILL "$child_pid" 2>/dev/null || true
            fi
            if kill -0 "$pid" 2>/dev/null; then
              kill -KILL "$pid" 2>/dev/null || true
            fi
            for i in $(seq 1 10); do
              if [[ -f "$TELEMETRY_OUTPUT_DIR/monitor.exitcode" ]]; then
                break
              fi
              sleep 1
            done
          fi
          if [[ ! -f "$TELEMETRY_OUTPUT_DIR/monitor.exitcode" ]]; then
            if [[ -n "$child_pid" ]] && kill -0 "$child_pid" 2>/dev/null; then
              :
            elif [[ -n "$pid" ]] && kill -0 "$pid" 2>/dev/null; then
              :
            else
              echo "1" > "$TELEMETRY_OUTPUT_DIR/monitor.exitcode"
              echo "telemetry(fuzz): synthesized monitor.exitcode=1 because wrapper exited before writing status" >&2
            fi
          fi

      - name: Summarize telemetry
        if: always()
        env:
          TELEMETRY_SUMMARY_DIR: ci-artifacts/telemetry/fuzz
          TELEMETRY_SUMMARY_OUT_JSON: ci-artifacts/telemetry/fuzz/summary.json
          TELEMETRY_SUMMARY_OUT_MD: ci-artifacts/telemetry/fuzz/summary.md
        run: |
          python3 ci/telemetry/summarize_metrics.py

      - name: Render telemetry charts
        if: always()
        env:
          TELEMETRY_SUMMARY_DIR: ci-artifacts/telemetry/fuzz
        run: |
          python3 ci/telemetry/render_charts.py

      - name: Upload fuzz artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-test-artifacts
          path: |
            test-results/fuzz/**
            ci-artifacts/telemetry/fuzz/metrics.csv
            ci-artifacts/telemetry/fuzz/events.log
            ci-artifacts/telemetry/fuzz/metadata.json
            ci-artifacts/telemetry/fuzz/monitor.log
            ci-artifacts/telemetry/fuzz/monitor.exitcode
            ci-artifacts/telemetry/fuzz/summary.json
            ci-artifacts/telemetry/fuzz/summary.md
            ci-artifacts/telemetry/fuzz/charts/**

      - name: Telemetry gates
        if: always()
        env:
