# Waydroid smoke test for the C64U Remote APK — a CI stand-in for a de-Googled,
# container-based Android host (LXC, AOSP, no Google services).
#
# Deliberately SELF-CONTAINED and EASILY DISABLED so it can never destabilise the
# main build:
#   - opt-in only: workflow_dispatch (manual) or the weekly schedule below,
#   - the whole job is `continue-on-error: true` (never fails the pipeline),
#   - a `run_waydroid` input / `WAYDROID_SMOKE_DISABLE` env can turn it off,
#   - Waydroid needs the kernel `binder` module + an LXC container, which is not
#     guaranteed on hosted runners; the harness preflights and skips gracefully.
# To retire it entirely, delete this file — nothing else depends on it.
name: Waydroid smoke (C64U Remote)

on:
  workflow_dispatch:
    inputs:
      run_waydroid:
        description: "Run the Waydroid smoke test"
        type: boolean
        default: true
  schedule:
    # Weekly, low priority. Comment this out to disable scheduled runs.
    - cron: "0 5 * * 1"

permissions:
  contents: read

jobs:
  waydroid-smoke:
    name: Waydroid | C64U Remote smoke
    runs-on: ubuntu-latest
    continue-on-error: true
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_waydroid }}
    env:
      WAYDROID_SMOKE_DISABLE: ${{ vars.WAYDROID_SMOKE_DISABLE || '0' }}
    steps:
      - uses: actions/checkout@v4

      - name: Preflight (never fails the build)
        run: bash scripts/waydroid-smoke.sh preflight || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build C64U Remote APK
        run: node scripts/build-android-apks.mjs --variants c64u-remote --verify-metadata

      - name: Setup Waydroid (binder + container + VANILLA image)
        run: sudo --preserve-env=WAYDROID_SMOKE_DISABLE bash scripts/waydroid-smoke.sh setup

      - name: Run Waydroid smoke against C64U Remote
        run: bash scripts/waydroid-smoke.sh run

      - name: Upload Waydroid evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: waydroid-smoke-evidence
          path: |
            artifacts/android-apks/validation/waydroid/**
            /tmp/waydroid-*.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Teardown
        if: always()
        run: bash scripts/waydroid-smoke.sh teardown || true
