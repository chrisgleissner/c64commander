name: web

on:
  pull_request:
  push:
    branches: ["main"]
    tags: ["*"]
  workflow_dispatch:

concurrency:
  group: web-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  CI_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
  DOCKER_LIMIT_MEMORY: 512m
  DOCKER_LIMIT_CPUS: "2"
  DOCKER_TARGET_CPU_FREQ_MHZ: "2000"

jobs:
  web-build-and-test:
    name: Web | Build + tests (${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            platform_key: linux-amd64
          - platform: linux/arm64
            platform_key: linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CI_SHA }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Resolve app version
        id: resolve_version
        shell: bash
        run: |
          set -euo pipefail
          APP_VERSION="$(node scripts/resolve-build-version.mjs)"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"
          echo "VITE_APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"
          echo "VITE_GIT_SHA=${CI_SHA}" >> "$GITHUB_ENV"
          echo "VITE_BUILD_TIME=$BUILD_TIME" >> "$GITHUB_ENV"
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "git_sha=${CI_SHA}" >> "$GITHUB_OUTPUT"
          echo "build_time=$BUILD_TIME" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Build web platform
        run: npm run build:web-platform

      - name: Run web-platform tests
        run: npm run test:web-platform

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4

      - name: Clear stale Docker Hub credentials
        run: docker logout registry-1.docker.io || true

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image (${{ matrix.platform }})
        run: |
          set -euo pipefail
          docker buildx build \
            --platform "${{ matrix.platform }}" \
            --load \
            --build-arg VITE_APP_VERSION="${VITE_APP_VERSION}" \
            --build-arg VITE_GIT_SHA="${VITE_GIT_SHA}" \
            --build-arg VITE_BUILD_TIME="${VITE_BUILD_TIME}" \
            -f web/Dockerfile \
            -t c64commander:ci \
            .

      - name: Start Docker telemetry monitor
        run: |
          set -euo pipefail
          mkdir -p ci-artifacts/telemetry/docker
          (
            status=0
            code_file="ci-artifacts/telemetry/docker/monitor.exitcode"
            wrote_code=0
            write_code_file() {
              if [[ "$wrote_code" == "0" ]]; then
                echo "$1" > "$code_file"
                wrote_code=1
              fi
            }
            trap 'write_code_file "$status"' EXIT
            TELEMETRY_INTERVAL_SEC=1 \
            TELEMETRY_OUTPUT_DIR=ci-artifacts/telemetry/docker \
            TELEMETRY_DOCKER_CONTAINER_NAME=c64commander-smoke \
            TELEMETRY_DEVICE_NAME="${{ matrix.platform }}-docker" \
            TELEMETRY_EXPECT_CONTAINER_UP=0 \
            ci/telemetry/docker/monitor_docker.sh &
            monitor_child_pid=$!
            echo "$monitor_child_pid" > ci-artifacts/telemetry/docker/monitor.child.pid
            wait "$monitor_child_pid" || status=$?
            write_code_file "$status"
          ) > ci-artifacts/telemetry/docker/monitor-run.log 2>&1 &
          echo $! > ci-artifacts/telemetry/docker/monitor.pid
          sleep 2
          if ! kill -0 "$(cat ci-artifacts/telemetry/docker/monitor.pid)" 2>/dev/null; then
            echo "Docker telemetry monitor failed to start; continuing without strict telemetry gating"
            cat ci-artifacts/telemetry/docker/monitor-run.log || true
            echo "1" > ci-artifacts/telemetry/docker/monitor.exitcode
          fi

      - name: Run Docker container smoke test
        run: |
          set -euo pipefail
          mkdir -p .tmp/web-config
          chmod 0777 .tmp/web-config
          docker run -d --name c64commander-smoke \
            --add-host=host.docker.internal:host-gateway \
            --memory "${DOCKER_LIMIT_MEMORY}" \
            --memory-swap "${DOCKER_LIMIT_MEMORY}" \
            --cpus "${DOCKER_LIMIT_CPUS}" \
            -p 18080:8064 \
            -v "$PWD/.tmp/web-config:/config" \
            c64commander:ci
          healthy=0
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18080/healthz >/dev/null; then
              healthy=1
              break
            fi
            sleep 1
          done
          if [[ "$healthy" != "1" ]]; then
            echo "Container failed health check within timeout; dumping logs"
            docker logs c64commander-smoke || true
            exit 1
          fi
          curl -fsS http://127.0.0.1:18080/healthz | tee /tmp/web-health.json

      - name: Run web-platform Playwright checks
        env:
          PLAYWRIGHT_REUSE_SERVER: "1"
          PLAYWRIGHT_PORT: "18080"
          PLAYWRIGHT_WORKERS: "1"
          PLAYWRIGHT_DEVICES: "web"
        run: npx playwright test playwright/webPlatformAuth.spec.ts --project=web

      - name: Stop Docker telemetry monitor
        if: always()
        run: |
          set -euo pipefail
          mkdir -p ci-artifacts/telemetry/docker
          pid=""
          child_pid=""
          if [[ -f ci-artifacts/telemetry/docker/monitor.child.pid ]]; then
            child_pid="$(cat ci-artifacts/telemetry/docker/monitor.child.pid)"
          fi
          if [[ -f ci-artifacts/telemetry/docker/monitor.pid ]]; then
            pid="$(cat ci-artifacts/telemetry/docker/monitor.pid)"
            if [[ -n "$child_pid" ]]; then
              kill -TERM "$child_pid" 2>/dev/null || true
            else
              kill -TERM "$pid" 2>/dev/null || true
            fi
            for _ in $(seq 1 20); do
              if [[ -f ci-artifacts/telemetry/docker/monitor.exitcode ]]; then
                break
              fi
              sleep 1
            done
            if [[ -n "$child_pid" ]] && kill -0 "$child_pid" 2>/dev/null; then
              kill -KILL "$child_pid" 2>/dev/null || true
            fi
            if kill -0 "$pid" 2>/dev/null; then
              kill -KILL "$pid" 2>/dev/null || true
            fi
            for _ in $(seq 1 10); do
              if [[ -f ci-artifacts/telemetry/docker/monitor.exitcode ]]; then
                break
              fi
              sleep 1
            done
          fi
          if [[ ! -f ci-artifacts/telemetry/docker/monitor.exitcode ]]; then
            if [[ -n "$child_pid" ]] && kill -0 "$child_pid" 2>/dev/null; then
              :
            elif [[ -n "$pid" ]] && kill -0 "$pid" 2>/dev/null; then
              :
            else
              echo "1" > ci-artifacts/telemetry/docker/monitor.exitcode
              echo "telemetry(web): synthesized monitor.exitcode=1 because wrapper exited before writing status" >&2
            fi
          fi
          cat ci-artifacts/telemetry/docker/monitor-run.log || true

      - name: Summarize Docker telemetry
        if: always() && hashFiles('ci-artifacts/telemetry/docker/metrics.csv') != ''
        run: |
          set -euo pipefail
          TELEMETRY_SUMMARY_DIR=ci-artifacts/telemetry python3 ci/telemetry/summarize_metrics.py

      - name: Render Docker telemetry charts
        if: always() && hashFiles('ci-artifacts/telemetry/docker/metrics.csv') != ''
        run: |
          set -euo pipefail
          TELEMETRY_SUMMARY_DIR=ci-artifacts/telemetry python3 ci/telemetry/render_charts.py

      - name: Upload Docker telemetry artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-docker-telemetry-${{ matrix.platform_key }}
          path: |
            ci-artifacts/telemetry/docker/**
            ci-artifacts/telemetry/summary.json
            ci-artifacts/telemetry/summary.md
            ci-artifacts/telemetry/charts/**
            /tmp/web-health.json
          if-no-files-found: warn

      - name: Enforce Docker telemetry gates
        if: success()
        run: |
          set -euo pipefail
          csv="ci-artifacts/telemetry/docker/metrics.csv"
          if [[ ! -f "$csv" ]]; then
            echo "telemetry gate warning: missing $csv; skipping strict telemetry enforcement"
            exit 0
          fi
          line_count=$(wc -l < "$csv")
          if [[ "$line_count" -le 1 ]]; then
            echo "telemetry gate warning: empty CSV; skipping strict telemetry enforcement"
            exit 0
          fi
          code_file="ci-artifacts/telemetry/docker/monitor.exitcode"
          if [[ ! -f "$code_file" ]]; then
            echo "telemetry gate warning: monitor exit code missing; skipping strict telemetry enforcement"
            exit 0
          fi
          code=$(cat "$code_file")
          if [[ "$code" == "3" ]]; then
            echo "telemetry gate failed: container disappeared (exit code 3)"
            exit 1
          fi
          if [[ "$code" != "0" ]]; then
            echo "telemetry gate warning: monitor exited with code $code; skipping strict telemetry enforcement"
            exit 0
          fi
          echo "telemetry gates passed: $line_count samples, monitor exit code $code"

      - name: Stop smoke container
        if: always()
        run: docker rm -f c64commander-smoke || true

  web-docker-publish:
    name: Web | Publish GHCR multi-arch
    runs-on: ubuntu-latest
    needs: [web-build-and-test]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate selected variant metadata
        run: npm run variant:generate

      - name: Resolve web variant metadata
        id: resolve_variant
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';

          const config = JSON.parse(fs.readFileSync('src/generated/variant.json', 'utf8'));
          const entries = {
            IMAGE_NAME: 'ghcr.io/chrisgleissner/c64commander',
            VARIANT_ARTIFACT_BASENAME: config.variant.exportedFileBasename,
          };
          fs.appendFileSync(
            process.env.GITHUB_ENV,
            `${Object.entries(entries)
              .map(([key, value]) => `${key}=${value}`)
              .join('\n')}\n`,
          );
          fs.appendFileSync(
            process.env.GITHUB_OUTPUT,
            `${Object.entries(entries)
              .map(([key, value]) => `${key.toLowerCase()}=${value}`)
              .join('\n')}\n`,
          );
          NODE

      - name: Resolve app version
        id: resolve_version
        shell: bash
        run: |
          set -euo pipefail
          APP_VERSION="$(node scripts/resolve-build-version.mjs)"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"
          echo "VITE_APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"
          echo "VITE_GIT_SHA=${CI_SHA}" >> "$GITHUB_ENV"
          echo "VITE_BUILD_TIME=$BUILD_TIME" >> "$GITHUB_ENV"
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "git_sha=${CI_SHA}" >> "$GITHUB_OUTPUT"
          echo "build_time=$BUILD_TIME" >> "$GITHUB_OUTPUT"

      - name: Verify publish tag format
        id: verify_tag
        shell: bash
        run: |
          set -euo pipefail
          TAG_RAW="${GITHUB_REF_NAME}"
          TAG="${TAG_RAW#v}"
          if ! printf '%s\n' "$TAG" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-rc[0-9]+)?$'; then
            echo "Unsupported publish tag format: $TAG_RAW"
            echo "Expected: X.Y.Z or X.Y.Z-rcN"
            exit 1
          fi

          IS_RC="false"
          if printf '%s\n' "$TAG" | grep -Eq -- '-rc[0-9]+$'; then
            IS_RC="true"
          fi

          echo "normalized_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "raw_tag=$TAG_RAW" >> "$GITHUB_OUTPUT"
          echo "is_rc=$IS_RC" >> "$GITHUB_OUTPUT"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4

      - name: Clear stale Docker Hub credentials
        run: docker logout registry-1.docker.io || true

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push linux/amd64,linux/arm64
        uses: docker/build-push-action@v7
        with:
          context: .
          file: web/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VITE_APP_VERSION=${{ steps.resolve_version.outputs.app_version }}
            VITE_GIT_SHA=${{ steps.resolve_version.outputs.git_sha }}
            VITE_BUILD_TIME=${{ steps.resolve_version.outputs.build_time }}
          tags: |
            ${{ steps.resolve_variant.outputs.image_name }}:${{ steps.verify_tag.outputs.normalized_tag }}
            ${{ steps.verify_tag.outputs.raw_tag != steps.verify_tag.outputs.normalized_tag && format('{0}:{1}', steps.resolve_variant.outputs.image_name, steps.verify_tag.outputs.raw_tag) || '' }}
            ${{ steps.verify_tag.outputs.is_rc != 'true' && format('{0}:latest', steps.resolve_variant.outputs.image_name) || '' }}
