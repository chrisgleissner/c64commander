name: ios

on:
  pull_request:
  push:
    branches: ["main"]
    tags: ["*"]
  workflow_dispatch:
    inputs:
      app_variant:
        description: Selected variant id to build and test
        required: false
        type: string
      publish_variants:
        description: Comma-separated variant ids to publish; defaults to repo publish defaults
        required: false
        type: string

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CI_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
  APP_VARIANT: ${{ github.event.inputs.app_variant || '' }}
  APP_PUBLISH_VARIANTS: ${{ github.event.inputs.publish_variants || '' }}
  IOS_ROLLOUT_STAGE: ${{ vars.IOS_ROLLOUT_STAGE || 'A' }}

# Rollout policy:
# - Stage A (default): iOS jobs are informative (non-blocking).
# - Stage B: ios-maestro-tests becomes the blocking required check.
# - Stage C: ios-package-altstore is required on tag refs.
# Set repository variable IOS_ROLLOUT_STAGE to A, B, or C.
#
# iOS failure triage checklist:
# 1) Runtime missing: inspect `xcrun simctl list runtimes` in job logs.
# 2) Simulator unavailable: inspect `xcrun simctl list devicetypes` and selected device.
# 3) Maestro selector drift: inspect `test-results/maestro/**` artifacts and update flows/selectors.
# 4) Packaging errors: inspect archive/zip steps and verify `ios/build/App.xcarchive` content.
#
# OPTIMIZATION: Single-runner iOS Maestro lane
# - GitHub-hosted macOS queueing makes 4-way matrix fanout slower than one curated lane.
# - Build + simulator test stay on one runner to avoid an extra macOS handoff.
# - The retained suite covers one smoke path plus iOS-only persistence behaviors.

jobs:
  variant-selection:
    name: Variant | Resolve publish set
    runs-on: ubuntu-latest
    outputs:
      publish_variants_json: ${{ steps.variant.outputs.publish_variants_json }}
      publish_variants_csv: ${{ steps.variant.outputs.publish_variants_csv }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CI_SHA }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate variant metadata
        run: npm run variant:generate

      - name: Export publish variant selection
        id: variant
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';

          const config = JSON.parse(fs.readFileSync('src/generated/variant.json', 'utf8'));
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `publish_variants_json=${JSON.stringify(config.repo.selectedPublishVariants)}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `publish_variants_csv=${config.repo.selectedPublishVariants.join(',')}\n`);
          NODE

  ios-prepare:
    name: iOS | Prepare
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CI_SHA }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve app version
        id: resolve_version
        run: |
          APP_VERSION="$(node scripts/resolve-build-version.mjs)"
          if [[ -z "$APP_VERSION" ]]; then
            APP_VERSION="0.0.${GITHUB_RUN_NUMBER}"
          fi
          APP_BUILD_NUMBER="${GITHUB_RUN_NUMBER:-1}"
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
          echo "APP_BUILD_NUMBER=$APP_BUILD_NUMBER" >> $GITHUB_ENV
          echo "app_version=$APP_VERSION" >> $GITHUB_OUTPUT

      - name: Generate selected variant metadata
        run: npm run variant:generate

      - name: Resolve iOS variant metadata
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';

          const config = JSON.parse(fs.readFileSync('src/generated/variant.json', 'utf8'));
          const lines = [
            `APP_ID=${config.variant.platform.ios.bundleId}`,
            `VARIANT_ARTIFACT_BASENAME=${config.variant.exportedFileBasename}`,
          ];
          fs.appendFileSync(process.env.GITHUB_ENV, `${lines.join('\n')}\n`);
          NODE

      - name: Print Xcode version
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Run native Swift unit tests
        run: |
          set -euo pipefail
          cd ios/native-tests
          swift test --enable-code-coverage

      - name: Export Swift coverage to lcov
        run: |
          set -euo pipefail
          PROFDATA="ios/native-tests/.build/debug/codecov/default.profdata"
          XCTEST=$(find ios/native-tests/.build/debug -maxdepth 1 -name "*.xctest" 2>/dev/null | head -1)
          if [[ -z "$XCTEST" ]]; then
            echo "No .xctest bundle found; skipping lcov export"
            exit 0
          fi
          BUNDLE_NAME=$(basename "$XCTEST" .xctest)
          BINARY="$XCTEST/Contents/MacOS/$BUNDLE_NAME"
          if [[ ! -f "$BINARY" || ! -f "$PROFDATA" ]]; then
            echo "Binary ($BINARY) or profdata ($PROFDATA) not found; skipping lcov export"
            exit 0
          fi
          xcrun llvm-cov export \
            -format=lcov \
            -instr-profile "$PROFDATA" \
            "$BINARY" \
            > ios/native-tests/swift-lcov.info
          echo "Swift lcov generated: $(wc -l < ios/native-tests/swift-lcov.info) lines"

      - name: Upload Swift coverage to Codecov
        uses: codecov/codecov-action@v5
        env:
          CODECOV_SHA: ${{ env.CI_SHA }}
          CC_SHA: ${{ env.CI_SHA }}
        with:
          files: ios/native-tests/swift-lcov.info
          flags: swift
          name: c64-commander-swift-coverage
          use_pypi: true
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Upload prepared iOS workspace
        uses: actions/upload-artifact@v4
        with:
          name: ios-prepared-workspace
          path: |
            ios/
            dist/
          if-no-files-found: error

  ios-maestro-tests:
    name: iOS | Maestro
    runs-on: macos-latest
    needs: ios-prepare
    timeout-minutes: 25

    env:
      IOS_MAESTRO_FLOWS: ios-ci-smoke,ios-secure-storage-persist,ios-config-persistence
      IOS_MAESTRO_GROUP: core

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CI_SHA }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download prepared iOS workspace
        uses: actions/download-artifact@v4
        with:
          name: ios-prepared-workspace
          path: .

      - name: Resolve app version
        id: resolve_version
        run: |
          APP_VERSION="$(node scripts/resolve-build-version.mjs)"
          if [[ -z "$APP_VERSION" ]]; then
            APP_VERSION="0.0.${GITHUB_RUN_NUMBER}"
          fi
          APP_BUILD_NUMBER="${GITHUB_RUN_NUMBER:-1}"
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
          echo "APP_BUILD_NUMBER=$APP_BUILD_NUMBER" >> $GITHUB_ENV
          echo "app_version=$APP_VERSION" >> $GITHUB_OUTPUT

      - name: Ensure CocoaPods scripts are executable
        run: |
          set -euo pipefail
          find ios/App/Pods/Target\ Support\ Files -name "*.sh" -type f -exec chmod +x {} +

      - name: Cache Maestro CLI
        uses: actions/cache@v4
        with:
          path: ~/.maestro
          key: maestro-cli-${{ runner.os }}-v1

      - name: Install Maestro CLI
        run: |
          set -euo pipefail
          MAESTRO_VERSION="cli-2.2.0"
          MAESTRO_SHA256="6de501d2e8adf2d60f4b6b3174dc4b5e393f2f2617245d350a659627dccb0922"
          if [[ -x "$HOME/.maestro/bin/maestro" ]] && "$HOME/.maestro/bin/maestro" --version | grep -q "2.2.0"; then
            echo "Maestro CLI cached"
            "$HOME/.maestro/bin/maestro" --version
          else
            tmpdir="$(mktemp -d)"
            trap 'rm -rf "$tmpdir"' EXIT
            curl -fsSL "https://github.com/mobile-dev-inc/Maestro/releases/download/${MAESTRO_VERSION}/maestro.zip" -o "$tmpdir/maestro.zip"
            echo "${MAESTRO_SHA256}  $tmpdir/maestro.zip" | shasum -a 256 -c -
            rm -rf "$HOME/.maestro/maestro"
            mkdir -p "$HOME/.maestro/bin"
            unzip -q "$tmpdir/maestro.zip" -d "$HOME/.maestro"
            chmod +x "$HOME/.maestro/maestro/bin/maestro"
            ln -sf "$HOME/.maestro/maestro/bin/maestro" "$HOME/.maestro/bin/maestro"
            "$HOME/.maestro/bin/maestro" --version
          fi
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Select simulator runtime and preboot
        id: simulator
        env:
          MATRIX_GROUP: ${{ env.IOS_MAESTRO_GROUP }}
        run: |
          set -euo pipefail

          python3 <<'PY'
          import json
          import os
          import subprocess
          import sys
          import time

          runtimes = json.loads(
              subprocess.check_output(["xcrun", "simctl", "list", "runtimes", "-j"], text=True)
          ).get("runtimes", [])

          preferred_major_versions = [18, 17, 26]
          runtime_identifier = None
          for major in preferred_major_versions:
              for runtime in runtimes:
                  if not runtime.get("isAvailable", False):
                      continue
                  identifier = runtime.get("identifier", "")
                  if not identifier.startswith("com.apple.CoreSimulator.SimRuntime.iOS-"):
                      continue
                  suffix = identifier.split("iOS-", 1)[1]
                  major_part = suffix.split("-")[0]
                  try:
                      parsed_major = int(major_part)
                  except ValueError:
                      continue
                  if parsed_major == major:
                      runtime_identifier = identifier
                      break
              if runtime_identifier:
                  break

          if not runtime_identifier:
              print("No supported iOS runtime found for policy 18 -> 17 -> 26", file=sys.stderr)
              sys.exit(1)

          device_types = json.loads(
              subprocess.check_output(["xcrun", "simctl", "list", "devicetypes", "-j"], text=True)
          ).get("devicetypes", [])
          iphone_13 = next((d for d in device_types if d.get("name") == "iPhone 13" and d.get("isAvailable", True)), None)
          if not iphone_13:
              print("Simulator device type iPhone 13 is unavailable", file=sys.stderr)
              sys.exit(1)

          group = os.environ.get("MATRIX_GROUP", "unknown")
          run_id = os.environ.get("GITHUB_RUN_ID", "local")
          run_attempt = os.environ.get("GITHUB_RUN_ATTEMPT", "1")
          sim_name = f"C64Commander-{group}-{run_id}-{run_attempt}"
          boot_start_ms = int(time.time() * 1000)

          udid = subprocess.check_output(
              ["xcrun", "simctl", "create", sim_name, iphone_13["identifier"], runtime_identifier],
              text=True,
          ).strip()
          subprocess.check_call(["xcrun", "simctl", "boot", udid])

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"runtime={runtime_identifier}\n")
              fh.write(f"device_type={iphone_13['identifier']}\n")
              fh.write(f"udid={udid}\n")
              fh.write(f"boot_start_ms={boot_start_ms}\n")
          PY

      - name: Build app for simulator
        run: |
          set -euo pipefail
          mkdir -p artifacts/ios/_infra/xcodebuild
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath ios/build \
            MARKETING_VERSION="$APP_VERSION" \
            CURRENT_PROJECT_VERSION="$APP_BUILD_NUMBER" \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee artifacts/ios/_infra/xcodebuild/build-simulator.log

      - name: Wait for simulator boot readiness
        id: simulator_ready
        env:
          SIMULATOR_UDID: ${{ steps.simulator.outputs.udid }}
          SIMULATOR_RUNTIME: ${{ steps.simulator.outputs.runtime }}
          SIM_BOOT_START_MS: ${{ steps.simulator.outputs.boot_start_ms }}
        run: |
          set -euo pipefail

          python3 <<'PY'
          import os
          import subprocess
          import sys
          import time

          udid = os.environ["SIMULATOR_UDID"]
          runtime_identifier = os.environ["SIMULATOR_RUNTIME"]
          boot_start_ms = int(os.environ["SIM_BOOT_START_MS"])

          print(f"Waiting for simulator {udid} bootstatus (timeout 300s)...")
          try:
              bootstatus = subprocess.run(
                  ["xcrun", "simctl", "bootstatus", udid, "-b"],
                  capture_output=True,
                  text=True,
                  timeout=300,
              )
          except subprocess.TimeoutExpired:
              print(f"Simulator {udid} did not boot within timeout", file=sys.stderr)
              print(subprocess.check_output(["xcrun", "simctl", "list", "devices", runtime_identifier], text=True), file=sys.stderr)
              sys.exit(1)

          if bootstatus.returncode != 0:
              print("simctl bootstatus failed on first attempt, attempting shutdown and retry...", file=sys.stderr)
              print(bootstatus.stdout, file=sys.stderr)
              print(bootstatus.stderr, file=sys.stderr)
              shutdown_retry = subprocess.run(
                  ["xcrun", "simctl", "shutdown", udid],
                  capture_output=True,
                  text=True,
                  check=False,
              )
              if shutdown_retry.returncode != 0:
                  print("simctl shutdown before retry failed (non-zero exit), continuing with boot retry...", file=sys.stderr)
                  print(shutdown_retry.stdout, file=sys.stderr)
                  print(shutdown_retry.stderr, file=sys.stderr)
              boot_retry = subprocess.run(
                  ["xcrun", "simctl", "boot", udid],
                  capture_output=True,
                  text=True,
                  check=False,
              )
              if boot_retry.returncode != 0:
                  print("simctl boot retry failed (non-zero exit), attempting bootstatus check...", file=sys.stderr)
                  print(boot_retry.stdout, file=sys.stderr)
                  print(boot_retry.stderr, file=sys.stderr)
              try:
                  bootstatus_retry = subprocess.run(
                      ["xcrun", "simctl", "bootstatus", udid, "-b"],
                      capture_output=True,
                      text=True,
                      timeout=300,
                  )
              except subprocess.TimeoutExpired as exc:
                  print("simctl bootstatus failed after retry (timeout)", file=sys.stderr)
                  print(getattr(exc, "stdout", "") or "", file=sys.stderr)
                  print(getattr(exc, "stderr", "") or "", file=sys.stderr)
                  sys.exit(1)
              else:
                  if bootstatus_retry.returncode != 0:
                      print("simctl bootstatus failed after retry", file=sys.stderr)
                      print(bootstatus_retry.stdout, file=sys.stderr)
                      print(bootstatus_retry.stderr, file=sys.stderr)
                      sys.exit(bootstatus_retry.returncode)

          boot_end_ms = int(time.time() * 1000)
          boot_seconds = (boot_end_ms - boot_start_ms) // 1000
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"boot_ready_ms={boot_end_ms}\n")
              fh.write(f"boot_seconds={boot_seconds}\n")
          PY

      - name: Run Maestro flows with evidence capture
        env:
          MAESTRO_CLI_NO_ANALYTICS: 1
          MAESTRO_LOG_LEVEL: debug
          MAESTRO_CLI_LOG_LEVEL: debug
          MAESTRO_DRIVER_STARTUP_TIMEOUT: "420000"
          MAESTRO_MAX_ATTEMPTS: "2"
          MAESTRO_DRIVER_RETRY_BOOT_TIMEOUT_SECONDS: "300"
          IOS_MAESTRO_HEARTBEAT_SECONDS: "15"
          IOS_DEBUG_PAYLOAD_MAX_ATTEMPTS: "3"
          IOS_DEBUG_PAYLOAD_CONNECT_TIMEOUT_SECONDS: "1"
          IOS_DEBUG_PAYLOAD_CURL_MAX_TIME_SECONDS: "2"
          IOS_MAESTRO_RECORD_VIDEO: ${{ vars.IOS_MAESTRO_RECORD_VIDEO || '0' }}
          IOS_MAESTRO_MOCK_PORT: ${{ vars.IOS_MAESTRO_MOCK_PORT || '' }}
          SIM_BOOT_START_MS: ${{ steps.simulator.outputs.boot_start_ms }}
          SIM_BOOT_READY_MS: ${{ steps.simulator_ready.outputs.boot_ready_ms }}
          CI: "true"
        run: |
          set -euo pipefail
          echo "Starting iOS Maestro runner: group=${IOS_MAESTRO_GROUP} flows=${IOS_MAESTRO_FLOWS} udid=${{ steps.simulator.outputs.udid }}"
          echo "Runner logging config: heartbeat=${IOS_MAESTRO_HEARTBEAT_SECONDS}s attempts=${MAESTRO_MAX_ATTEMPTS} driverTimeout=${MAESTRO_DRIVER_STARTUP_TIMEOUT}"
          mkdir -p artifacts/ios/_infra/telemetry
          (
            status=0
            code_file="artifacts/ios/_infra/telemetry/monitor.exitcode"
            wrote_code=0
            write_code_file() {
              if [[ "$wrote_code" == "0" ]]; then
                echo "$1" > "$code_file"
                wrote_code=1
              fi
            }
            trap 'write_code_file "$status"' EXIT
            TELEMETRY_INTERVAL_SEC=1 \
            TELEMETRY_OUTPUT_DIR=artifacts/ios/_infra/telemetry \
            SIMULATOR_UDID="${{ steps.simulator.outputs.udid }}" \
            TELEMETRY_DEVICE_NAME="${IOS_MAESTRO_GROUP}-${{ steps.simulator.outputs.udid }}" \
            BUNDLE_ID="${APP_ID}" \
            ci/telemetry/ios/monitor_ios.sh &
            monitor_child_pid=$!
            echo "$monitor_child_pid" > artifacts/ios/_infra/telemetry/monitor.child.pid
            wait "$monitor_child_pid" || status=$?
            write_code_file "$status"
          ) > artifacts/ios/_infra/telemetry/monitor-run.log 2>&1 &
          echo $! > artifacts/ios/_infra/telemetry/monitor.pid
          sleep 2
          if ! kill -0 "$(cat artifacts/ios/_infra/telemetry/monitor.pid)" 2>/dev/null; then
            echo "iOS telemetry monitor failed to start"
            cat artifacts/ios/_infra/telemetry/monitor-run.log || true
            exit 1
          fi
          echo "iOS telemetry monitor started with parent pid $(cat artifacts/ios/_infra/telemetry/monitor.pid)"

          mock_port_args=()
          if [[ -n "${IOS_MAESTRO_MOCK_PORT:-}" ]]; then
            mock_port_args=(--mock-port "${IOS_MAESTRO_MOCK_PORT}")
            echo "Using external mock port ${IOS_MAESTRO_MOCK_PORT}"
          else
            echo "No external mock port configured for grouped Maestro run"
          fi

          export TELEMETRY_FLOW_LIFECYCLE_DIR="artifacts/ios/_infra/telemetry"

          maestro_cmd=(
            bash scripts/ci/ios-maestro-run-flow.sh
            --flows "${IOS_MAESTRO_FLOWS}"
            --group "${IOS_MAESTRO_GROUP}"
            --udid "${{ steps.simulator.outputs.udid }}"
            --app-path "ios/build/Build/Products/Debug-iphonesimulator/App.app"
          )
          if [[ ${#mock_port_args[@]} -gt 0 ]]; then
            maestro_cmd+=("${mock_port_args[@]}")
          fi
          echo "Invoking runner: ${maestro_cmd[*]}"
          maestro_status=0
          "${maestro_cmd[@]}" || maestro_status=$?
          echo "Grouped Maestro runner exited with status ${maestro_status}"
          if [[ "$maestro_status" -ne 0 ]]; then
            exit "$maestro_status"
          fi

      - name: Validate connectivity
        if: always()
        run: |
          set -euo pipefail
          connectivity_status=0
          IFS=',' read -ra FLOW_ARRAY <<< "${IOS_MAESTRO_FLOWS}"
          for flow in "${FLOW_ARRAY[@]}"; do
            if ! bash scripts/ci/validate-ios-connectivity.sh "artifacts/ios/${flow}"; then
              connectivity_status=1
            fi
          done
          exit "$connectivity_status"

      - name: Stop iOS telemetry monitor
        if: always()
        run: |
          set -euo pipefail
          pid=""
          child_pid=""
          if [[ -f artifacts/ios/_infra/telemetry/monitor.child.pid ]]; then
            child_pid="$(cat artifacts/ios/_infra/telemetry/monitor.child.pid)"
          fi
          if [[ -f artifacts/ios/_infra/telemetry/monitor.pid ]]; then
            pid="$(cat artifacts/ios/_infra/telemetry/monitor.pid)"
            if [[ -n "$child_pid" ]]; then
              kill -TERM "$child_pid" 2>/dev/null || true
            else
              kill -TERM "$pid" 2>/dev/null || true
            fi
            for _ in $(seq 1 20); do
              if [[ -f artifacts/ios/_infra/telemetry/monitor.exitcode ]]; then
                break
              fi
              sleep 1
            done
            if [[ -n "$child_pid" ]] && kill -0 "$child_pid" 2>/dev/null; then
              kill -KILL "$child_pid" 2>/dev/null || true
            fi
            if kill -0 "$pid" 2>/dev/null; then
              kill -KILL "$pid" 2>/dev/null || true
            fi
            for _ in $(seq 1 10); do
              if [[ -f artifacts/ios/_infra/telemetry/monitor.exitcode ]]; then
                break
              fi
              sleep 1
            done
          fi
          if [[ ! -f artifacts/ios/_infra/telemetry/monitor.exitcode ]]; then
            if [[ -n "$child_pid" ]] && kill -0 "$child_pid" 2>/dev/null; then
              :
            elif [[ -n "$pid" ]] && kill -0 "$pid" 2>/dev/null; then
              :
            else
              echo "1" > artifacts/ios/_infra/telemetry/monitor.exitcode
              echo "telemetry(ios): synthesized monitor.exitcode=1 because wrapper exited before writing status" >&2
            fi
          fi
          cat artifacts/ios/_infra/telemetry/monitor-run.log || true

      - name: Summarize telemetry
        if: always()
        run: |
          set -euo pipefail
          TELEMETRY_SUMMARY_DIR=artifacts/ios/_infra/telemetry python3 ci/telemetry/summarize_metrics.py

      - name: Render telemetry charts
        if: always()
        run: |
          set -euo pipefail
          TELEMETRY_SUMMARY_DIR=artifacts/ios/_infra/telemetry python3 ci/telemetry/render_charts.py

      - name: Upload iOS Maestro evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-maestro-evidence
          path: |
            artifacts/ios/**
            artifacts/ios/_infra/telemetry/metrics.csv
            artifacts/ios/_infra/telemetry/events.log
            artifacts/ios/_infra/telemetry/summary.json
            artifacts/ios/_infra/telemetry/summary.md
            artifacts/ios/_infra/telemetry/charts/**
          if-no-files-found: warn

      - name: Create evidence archive on tag
        if: always() && github.ref_type == 'tag'
        run: |
          set -euo pipefail
          mkdir -p artifacts/ios/_combined
          tar -czf artifacts/ios/_combined/ios-maestro-evidence.tgz artifacts/ios

      - name: Upload evidence archive on tag
        if: always() && github.ref_type == 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: ios-maestro-evidence-tgz
          path: artifacts/ios/_combined/ios-maestro-evidence.tgz
          if-no-files-found: warn

      - name: Enforce iOS telemetry gates
        if: always()
        run: |
          set -euo pipefail
          expected_header="timestamp,platform,device,process_name,pid,cpu_percent,rss_kb,threads,pss_kb,dalvik_pss_kb,native_pss_kb,total_pss_kb"
          csv="artifacts/ios/_infra/telemetry/metrics.csv"
          if [[ ! -f "$csv" ]]; then
            echo "telemetry gate failed: missing $csv"
            exit 1
          fi
          header=$(head -n 1 "$csv")
          if [[ "$header" != "$expected_header" ]]; then
            echo "telemetry gate failed: unexpected CSV header"
            echo "expected: $expected_header"
            echo "actual:   $header"
            exit 1
          fi
          line_count=$(wc -l < "$csv")
          if [[ "$line_count" -le 2 ]]; then
            echo "telemetry gate failed: expected multiple data rows, found $((line_count-1))"
            exit 1
          fi
          code_file="artifacts/ios/_infra/telemetry/monitor.exitcode"
          if [[ ! -f "$code_file" ]]; then
            echo "telemetry gate failed: monitor exit code missing"
            exit 1
          fi
          code=$(cat "$code_file")
          if [[ "$code" == "3" ]]; then
            if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" != *-rc* ]]; then
              echo "telemetry gate failed: app process disappearance/restart detected on stable tag flow; see artifacts/ios/_infra/telemetry/events.log"
              exit 1
            fi
            if [[ "${GITHUB_REF_NAME}" == release/* ]]; then
              echo "telemetry gate failed: app process disappearance/restart detected on release flow; see artifacts/ios/_infra/telemetry/events.log"
              exit 1
            fi
            echo "telemetry gate warning: app process disappearance/restart detected (rc or non-release flow); see artifacts/ios/_infra/telemetry/events.log"
            exit 0
          fi
          if [[ "$code" == "4" ]]; then
            echo "telemetry gate warning: app process disappearance detected but simctl was unavailable at detection time (reduced reliability; likely simulator infra issue); see artifacts/ios/_infra/telemetry/events.log"
            exit 0
          fi
          if [[ "$code" == "137" ]]; then
            echo "telemetry gate warning: monitor exited with code 137 (likely infra resource kill); see artifacts/ios/_infra/telemetry/monitor-run.log"
            exit 0
          fi
          if [[ "$code" != "0" ]]; then
            echo "telemetry gate failed: monitor exited with code $code"
            exit 1
          fi

      - name: Collect simulator diagnostics on failure
        if: failure()
        run: |
          set -euo pipefail
          mkdir -p artifacts/ios/_infra/simulator
          simulator_log_lookback="${IOS_SIMULATOR_LOG_LOOKBACK:-15m}"
          if [[ -n "${{ steps.simulator.outputs.udid }}" ]]; then
            xcrun simctl spawn "${{ steps.simulator.outputs.udid }}" log show --last "$simulator_log_lookback" --style compact > artifacts/ios/_infra/simulator/device.log 2>&1 || true
            xcrun simctl diagnose "${{ steps.simulator.outputs.udid }}" > artifacts/ios/_infra/simulator/diagnose.log 2>&1 || true
          fi
          xcrun simctl list devices > artifacts/ios/_infra/simulator/devices.txt 2>&1 || true
          xcrun simctl list runtimes > artifacts/ios/_infra/simulator/runtimes.txt 2>&1 || true

      - name: Upload iOS failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-maestro-failure
          path: |
            artifacts/ios/_infra/telemetry/events.log
            artifacts/ios/_infra/telemetry/monitor-run.log
            artifacts/ios/_infra/telemetry/monitor.exitcode
            artifacts/ios/_infra/simulator/**
            artifacts/ios/_infra/xcodebuild/**
          if-no-files-found: warn

      - name: Shutdown and delete simulator
        if: always()
        run: |
          if [[ -n "${{ steps.simulator.outputs.udid }}" ]]; then
            xcrun simctl shutdown "${{ steps.simulator.outputs.udid }}" || true
            xcrun simctl delete "${{ steps.simulator.outputs.udid }}" || true
          fi

  ios-package-altstore:
    name: iOS | Package IPA (${{ matrix.variant }})
    runs-on: macos-latest
    needs: [ios-prepare, variant-selection]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        variant: ${{ fromJson(needs.variant-selection.outputs.publish_variants_json) }}

    env:
      APP_VARIANT: ${{ matrix.variant }}
      APP_PUBLISH_VARIANTS: ${{ needs.variant-selection.outputs.publish_variants_csv }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CI_SHA }}
          fetch-depth: 50

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Resolve app version
        id: resolve_version
        run: |
          APP_VERSION="$(node scripts/resolve-build-version.mjs)"
          if [[ -z "$APP_VERSION" ]]; then
            APP_VERSION="0.0.${GITHUB_RUN_NUMBER}"
          fi
          APP_BUILD_NUMBER="${GITHUB_RUN_NUMBER:-1}"
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
          echo "APP_BUILD_NUMBER=$APP_BUILD_NUMBER" >> $GITHUB_ENV
          echo "app_version=$APP_VERSION" >> $GITHUB_OUTPUT

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Resolve iOS variant metadata
        id: resolve_variant
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';

          const config = JSON.parse(fs.readFileSync('src/generated/variant.json', 'utf8'));
          const entries = {
            APP_ID: config.variant.platform.ios.bundleId,
            VARIANT_ARTIFACT_BASENAME: config.variant.exportedFileBasename,
          };
          fs.appendFileSync(
            process.env.GITHUB_ENV,
            `${Object.entries(entries)
              .map(([key, value]) => `${key}=${value}`)
              .join('\n')}\n`,
          );
          fs.appendFileSync(
            process.env.GITHUB_OUTPUT,
            `${Object.entries(entries)
              .map(([key, value]) => `${key.toLowerCase()}=${value}`)
              .join('\n')}\n`,
          );
          NODE

      - name: Ensure CocoaPods scripts are executable
        run: |
          set -euo pipefail
          find ios/App/Pods/Target\ Support\ Files -name "*.sh" -type f -exec chmod +x {} +

      - name: Build unsigned iOS device app
        run: |
          set -euo pipefail
          mkdir -p ios/build
          mkdir -p artifacts/ios/_infra/xcodebuild
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ios/build \
            MARKETING_VERSION="$APP_VERSION" \
            CURRENT_PROJECT_VERSION="$APP_BUILD_NUMBER" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            2>&1 | tee artifacts/ios/_infra/xcodebuild/build-device-release.log

      - name: Package iOS IPA
        run: |
          set -euo pipefail
          IPA_BASENAME="${VARIANT_ARTIFACT_BASENAME}-${APP_VERSION}-ios"
          rm -rf ios/build/Payload
          mkdir -p ios/build/Payload
          cp -R ios/build/Build/Products/Release-iphoneos/App.app ios/build/Payload/App.app
          (
            cd ios/build
            zip -qry "${IPA_BASENAME}.ipa" Payload
          )

      - name: Upload iOS IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.resolve_variant.outputs.variant_artifact_basename }}-ios-ipa
          path: |
            ios/build/${{ steps.resolve_variant.outputs.variant_artifact_basename }}-${{ steps.resolve_version.outputs.app_version }}-ios.ipa
          if-no-files-found: error

      - name: Upload iOS package diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-package-failure
          path: |
            artifacts/ios/_infra/xcodebuild/**
          if-no-files-found: warn

      - name: Ensure GitHub release exists
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release already exists for $TAG"
          else
            if [[ "$TAG" == *-rc* ]]; then
              gh release create "$TAG" --target "$GITHUB_SHA" --verify-tag --prerelease --generate-notes
            else
              gh release create "$TAG" --target "$GITHUB_SHA" --verify-tag --generate-notes
            fi
          fi

      - name: Publish iOS IPA on tags
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "${GITHUB_REF_NAME}" \
            "ios/build/${VARIANT_ARTIFACT_BASENAME}-${APP_VERSION}-ios.ipa" \
            --clobber

  ios-package-paid:
    name: iOS | Package paid signing
    runs-on: macos-latest
    needs: ios-prepare
    if: vars.IOS_PAID_SIGNING_ENABLED == 'true'
    # Required repository variables/secrets when enabling this lane:
    # - vars.IOS_PAID_SIGNING_ENABLED=true
    # - secrets.IOS_BUILD_CERTIFICATE_BASE64
    # - secrets.IOS_P12_PASSWORD
    # - secrets.IOS_PROVISIONING_PROFILE_BASE64
    # - secrets.IOS_TEAM_ID
    # - secrets.IOS_SIGNING_IDENTITY

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CI_SHA }}

      - name: Download prepared iOS workspace
        uses: actions/download-artifact@v4
        with:
          name: ios-prepared-workspace
          path: .

      - name: Ensure CocoaPods scripts are executable
        run: |
          set -euo pipefail
          find ios/App/Pods/Target\ Support\ Files -name "*.sh" -type f -exec chmod +x {} +

      - name: Paid signing lane guard
        run: |
          set -euo pipefail
          echo "Paid signing lane enabled. Configure certificate import, provisioning profile install, and export options before release use."
