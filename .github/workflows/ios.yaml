name: ios

on:
  pull_request:
  push:
    branches: ["main"]
    tags: ["*"]
  workflow_dispatch:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CI_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
  APP_ID: uk.gleissner.c64commander
  IOS_ROLLOUT_STAGE: ${{ vars.IOS_ROLLOUT_STAGE || 'A' }}

# Rollout policy:
# - Stage A (default): iOS jobs are informative (non-blocking).
# - Stage B: ios-build-simulator and ios-maestro-tests become blocking required checks.
# - Stage C: ios-package-altstore is required on tag refs.
# Set repository variable IOS_ROLLOUT_STAGE to A, B, or C.
#
# iOS failure triage checklist:
# 1) Runtime missing: inspect `xcrun simctl list runtimes` in job logs.
# 2) Simulator unavailable: inspect `xcrun simctl list devicetypes` and selected device.
# 3) Maestro selector drift: inspect `test-results/maestro/**` artifacts and update flows/selectors.
# 4) Packaging errors: inspect archive/zip steps and verify `ios/build/App.xcarchive` content.
#
# OPTIMIZATION: Grouped matrix (4 groups, P=4 concurrency)
# - Each group runs multiple flows sequentially on one simulator
# - Reduces simulator lifecycle overhead from 9x to 4x
# - Expected wall-clock reduction: ~40% (25min -> 15min)
# - Runtime model: T_grouped = O + 3F vs T_current = 3O + 3F

jobs:
  ios-prepare:
    name: iOS | Prepare
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CI_SHA }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve app version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && -n "${GITHUB_REF_NAME}" ]]; then
            APP_VERSION="${GITHUB_REF_NAME}"
          else
            APP_VERSION="$(git describe --tags --exact-match 2>/dev/null || true)"
            if [[ -z "$APP_VERSION" ]]; then
              APP_VERSION="$(node -p "require('./package.json').version" 2>/dev/null || true)"
            fi
          fi
          if [[ -z "$APP_VERSION" ]]; then
            APP_VERSION="0.0.${GITHUB_RUN_NUMBER}"
          fi
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV

      - name: Print Xcode version
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Upload prepared iOS workspace
        uses: actions/upload-artifact@v4
        with:
          name: ios-prepared-workspace
          path: |
            ios/
            dist/
          if-no-files-found: error

  ios-build-simulator:
    name: iOS | Build simulator
    runs-on: macos-latest
    needs: ios-prepare
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CI_SHA }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Download prepared iOS workspace
        uses: actions/download-artifact@v4
        with:
          name: ios-prepared-workspace
          path: .

      - name: Ensure CocoaPods scripts are executable
        run: |
          set -euo pipefail
          find ios/App/Pods/Target\ Support\ Files -name "*.sh" -type f -exec chmod +x {} +

      - name: Build app for simulator
        run: |
          set -euo pipefail
          mkdir -p artifacts/ios/_infra/xcodebuild
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee artifacts/ios/_infra/xcodebuild/build-simulator.log

      - name: Upload simulator build diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-simulator-failure
          path: |
            artifacts/ios/_infra/xcodebuild/**
          if-no-files-found: warn

      - name: Upload simulator app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: ios/build/Build/Products/Debug-iphonesimulator/App.app
          if-no-files-found: error

  ios-maestro-tests:
    name: iOS | Maestro ${{ matrix.group.name }}
    runs-on: macos-latest
    needs: ios-build-simulator
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        group:
          - name: group-1
            flows: "ios-smoke-launch,ios-diagnostics-export"
          - name: group-2
            flows: "ios-ftp-browse,ios-local-import"
          - name: group-3
            flows: "ios-secure-storage-persist,ios-import-playback"
          - name: group-4
            flows: "ios-hvsc-browse,ios-config-persistence,ios-playback-basics"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CI_SHA }}

      - name: Download simulator app
        uses: actions/download-artifact@v4
        with:
          name: ios-simulator-app
          path: App.app

      - name: Cache Maestro CLI
        uses: actions/cache@v4
        with:
          path: ~/.maestro
          key: maestro-cli-${{ runner.os }}-v1

      - name: Install Maestro CLI
        run: |
          set -euo pipefail
          if [[ -x "$HOME/.maestro/bin/maestro" ]]; then
            echo "Maestro CLI cached"
            "$HOME/.maestro/bin/maestro" --version
          else
            curl -Ls "https://get.maestro.mobile.dev" | bash
            "$HOME/.maestro/bin/maestro" --version
          fi
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Select simulator runtime and boot
        id: simulator
        run: |
          set -euo pipefail

          python3 <<'PY'
          import json
          import os
          import subprocess
          import sys
          import time

          runtimes = json.loads(
              subprocess.check_output(["xcrun", "simctl", "list", "runtimes", "-j"], text=True)
          ).get("runtimes", [])

          preferred_major_versions = [18, 17, 26]
          runtime_identifier = None
          for major in preferred_major_versions:
              for runtime in runtimes:
                  if not runtime.get("isAvailable", False):
                      continue
                  identifier = runtime.get("identifier", "")
                  if not identifier.startswith("com.apple.CoreSimulator.SimRuntime.iOS-"):
                      continue
                  suffix = identifier.split("iOS-", 1)[1]
                  major_part = suffix.split("-")[0]
                  try:
                      parsed_major = int(major_part)
                  except ValueError:
                      continue
                  if parsed_major == major:
                      runtime_identifier = identifier
                      break
              if runtime_identifier:
                  break

          if not runtime_identifier:
              print("No supported iOS runtime found for policy 18 -> 17 -> 26", file=sys.stderr)
              sys.exit(1)

          device_types = json.loads(
              subprocess.check_output(["xcrun", "simctl", "list", "devicetypes", "-j"], text=True)
          ).get("devicetypes", [])
          iphone_13 = next((d for d in device_types if d.get("name") == "iPhone 13" and d.get("isAvailable", True)), None)
          if not iphone_13:
              print("Simulator device type iPhone 13 is unavailable", file=sys.stderr)
              sys.exit(1)

          group = os.environ.get("MATRIX_GROUP", "unknown")
          run_id = os.environ.get("GITHUB_RUN_ID", "local")
          run_attempt = os.environ.get("GITHUB_RUN_ATTEMPT", "1")
          sim_name = f"C64Commander-{group}-{run_id}-{run_attempt}"

          # Record boot start time for timing instrumentation
          boot_start_ms = int(time.time() * 1000)

          udid = subprocess.check_output(
              ["xcrun", "simctl", "create", sim_name, iphone_13["identifier"], runtime_identifier],
              text=True,
            ).strip()
          subprocess.check_call(["xcrun", "simctl", "boot", udid])

          print(f"Waiting for simulator {udid} bootstatus (timeout 300s)...")
          try:
              bootstatus = subprocess.run(
                  ["xcrun", "simctl", "bootstatus", udid, "-b"],
                  capture_output=True,
                  text=True,
                  timeout=300,
              )
          except subprocess.TimeoutExpired:
              print(f"Simulator {udid} did not boot within timeout", file=sys.stderr)
              print(subprocess.check_output(["xcrun", "simctl", "list", "devices", runtime_identifier], text=True), file=sys.stderr)
              sys.exit(1)

          if bootstatus.returncode != 0:
              print("simctl bootstatus failed on first attempt, attempting shutdown and retry...", file=sys.stderr)
              print(bootstatus.stdout, file=sys.stderr)
              print(bootstatus.stderr, file=sys.stderr)
              shutdown_retry = subprocess.run(
                  ["xcrun", "simctl", "shutdown", udid],
                  capture_output=True,
                  text=True,
                  check=False,
              )
              if shutdown_retry.returncode != 0:
                  print("simctl shutdown before retry failed (non-zero exit), continuing with boot retry...", file=sys.stderr)
                  print(shutdown_retry.stdout, file=sys.stderr)
                  print(shutdown_retry.stderr, file=sys.stderr)
              boot_retry = subprocess.run(
                  ["xcrun", "simctl", "boot", udid],
                  capture_output=True,
                  text=True,
                  check=False,
              )
              if boot_retry.returncode != 0:
                  print("simctl boot retry failed (non-zero exit), attempting bootstatus check...", file=sys.stderr)
                  print(boot_retry.stdout, file=sys.stderr)
                  print(boot_retry.stderr, file=sys.stderr)
              try:
                  bootstatus_retry = subprocess.run(
                      ["xcrun", "simctl", "bootstatus", udid, "-b"],
                      capture_output=True,
                      text=True,
                      timeout=300,
                  )
              except subprocess.TimeoutExpired as exc:
                  print("simctl bootstatus failed after retry (timeout)", file=sys.stderr)
                  # exc.stdout and exc.stderr may be None; default to empty strings
                  print(getattr(exc, "stdout", "") or "", file=sys.stderr)
                  print(getattr(exc, "stderr", "") or "", file=sys.stderr)
                  sys.exit(1)
              else:
                  if bootstatus_retry.returncode != 0:
                      print("simctl bootstatus failed after retry", file=sys.stderr)
                      print(bootstatus_retry.stdout, file=sys.stderr)
                      print(bootstatus_retry.stderr, file=sys.stderr)
                      sys.exit(bootstatus_retry.returncode)

          boot_end_ms = int(time.time() * 1000)
          boot_seconds = (boot_end_ms - boot_start_ms) // 1000

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"runtime={runtime_identifier}\n")
              fh.write(f"device_type={iphone_13['identifier']}\n")
              fh.write(f"udid={udid}\n")
              fh.write(f"boot_start_ms={boot_start_ms}\n")
              fh.write(f"boot_ready_ms={boot_end_ms}\n")
              fh.write(f"boot_seconds={boot_seconds}\n")
          PY
        env:
          MATRIX_GROUP: ${{ matrix.group.name }}

      - name: Run Maestro flows with evidence capture (${{ matrix.group.name }})
        env:
          MAESTRO_CLI_NO_ANALYTICS: 1
          MAESTRO_LOG_LEVEL: debug
          MAESTRO_CLI_LOG_LEVEL: debug
          MAESTRO_DRIVER_STARTUP_TIMEOUT: "420000"
          MAESTRO_MAX_ATTEMPTS: "2"
          MAESTRO_DRIVER_RETRY_BOOT_TIMEOUT_SECONDS: "300"
          IOS_DEBUG_PAYLOAD_MAX_ATTEMPTS: "3"
          IOS_DEBUG_PAYLOAD_CONNECT_TIMEOUT_SECONDS: "1"
          IOS_DEBUG_PAYLOAD_CURL_MAX_TIME_SECONDS: "2"
          IOS_MAESTRO_RECORD_VIDEO: ${{ vars.IOS_MAESTRO_RECORD_VIDEO || '0' }}
          IOS_MAESTRO_MOCK_PORT: ${{ vars.IOS_MAESTRO_MOCK_PORT || '' }}
          SIM_BOOT_START_MS: ${{ steps.simulator.outputs.boot_start_ms }}
          SIM_BOOT_READY_MS: ${{ steps.simulator.outputs.boot_ready_ms }}
          CI: "true"
        run: |
          set -euo pipefail
          mkdir -p artifacts/ios/_infra/telemetry
          (
            status=0
            TELEMETRY_INTERVAL_SEC=1 \
            TELEMETRY_OUTPUT_DIR=artifacts/ios/_infra/telemetry \
            SIMULATOR_UDID="${{ steps.simulator.outputs.udid }}" \
            TELEMETRY_DEVICE_NAME="${{ matrix.group.name }}-${{ steps.simulator.outputs.udid }}" \
            BUNDLE_ID="${APP_ID}" \
            ci/telemetry/ios/monitor_ios.sh &
            monitor_child_pid=$!
            echo "$monitor_child_pid" > artifacts/ios/_infra/telemetry/monitor.child.pid
            wait "$monitor_child_pid" || status=$?
            echo "$status" > artifacts/ios/_infra/telemetry/monitor.exitcode
          ) > artifacts/ios/_infra/telemetry/monitor-run.log 2>&1 &
          echo $! > artifacts/ios/_infra/telemetry/monitor.pid
          sleep 2
          if ! kill -0 "$(cat artifacts/ios/_infra/telemetry/monitor.pid)" 2>/dev/null; then
            echo "iOS telemetry monitor failed to start"
            cat artifacts/ios/_infra/telemetry/monitor-run.log || true
            exit 1
          fi

          touch artifacts/ios/_infra/telemetry/flow-active.flag

          mock_port_args=()
          if [[ -n "${IOS_MAESTRO_MOCK_PORT:-}" ]]; then
            mock_port_args=(--mock-port "${IOS_MAESTRO_MOCK_PORT}")
          fi

          maestro_cmd=(
            bash scripts/ci/ios-maestro-run-flow.sh
            --flows "${{ matrix.group.flows }}"
            --group "${{ matrix.group.name }}"
            --udid "${{ steps.simulator.outputs.udid }}"
            --app-path "App.app"
          )
          if [[ ${#mock_port_args[@]} -gt 0 ]]; then
            maestro_cmd+=("${mock_port_args[@]}")
          fi
          maestro_status=0
          "${maestro_cmd[@]}" || maestro_status=$?
          rm -f artifacts/ios/_infra/telemetry/flow-active.flag
          touch artifacts/ios/_infra/telemetry/flow-complete.flag
          if [[ "$maestro_status" -ne 0 ]]; then
            exit "$maestro_status"
          fi

      - name: Validate connectivity (${{ matrix.group.name }})
        if: always()
        run: |
          # Validate connectivity for each flow in the group
          IFS=',' read -ra FLOW_ARRAY <<< "${{ matrix.group.flows }}"
          for flow in "${FLOW_ARRAY[@]}"; do
            bash scripts/ci/validate-ios-connectivity.sh "artifacts/ios/${flow}" || true
          done

      - name: Stop iOS telemetry monitor
        if: always()
        run: |
          set -euo pipefail
          child_pid=""
          if [[ -f artifacts/ios/_infra/telemetry/monitor.child.pid ]]; then
            child_pid="$(cat artifacts/ios/_infra/telemetry/monitor.child.pid)"
          fi
          if [[ -f artifacts/ios/_infra/telemetry/monitor.pid ]]; then
            pid="$(cat artifacts/ios/_infra/telemetry/monitor.pid)"
            if [[ -n "$child_pid" ]]; then
              kill -TERM "$child_pid" 2>/dev/null || true
            else
              kill -TERM "$pid" 2>/dev/null || true
            fi
            for _ in $(seq 1 20); do
              if [[ -f artifacts/ios/_infra/telemetry/monitor.exitcode ]]; then
                break
              fi
              sleep 1
            done
            if [[ -n "$child_pid" ]] && kill -0 "$child_pid" 2>/dev/null; then
              kill -KILL "$child_pid" 2>/dev/null || true
            fi
            if kill -0 "$pid" 2>/dev/null; then
              kill -KILL "$pid" 2>/dev/null || true
            fi
          fi
          cat artifacts/ios/_infra/telemetry/monitor-run.log || true

      - name: Summarize telemetry (${{ matrix.group.name }})
        if: always()
        run: |
          set -euo pipefail
          TELEMETRY_SUMMARY_DIR=artifacts/ios/_infra/telemetry python3 ci/telemetry/summarize_metrics.py

      - name: Render telemetry charts (${{ matrix.group.name }})
        if: always()
        run: |
          set -euo pipefail
          TELEMETRY_SUMMARY_DIR=artifacts/ios/_infra/telemetry python3 ci/telemetry/render_charts.py

      - name: Upload per-group artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-maestro-${{ matrix.group.name }}
          path: |
            artifacts/ios/**
            artifacts/ios/_infra/telemetry/metrics.csv
            artifacts/ios/_infra/telemetry/events.log
            artifacts/ios/_infra/telemetry/summary.json
            artifacts/ios/_infra/telemetry/summary.md
            artifacts/ios/_infra/telemetry/charts/**
          if-no-files-found: warn

      - name: Enforce iOS telemetry gates (${{ matrix.group.name }})
        if: always()
        run: |
          set -euo pipefail
          expected_header="timestamp,platform,device,process_name,pid,cpu_percent,rss_kb,threads,pss_kb,dalvik_pss_kb,native_pss_kb,total_pss_kb"
          csv="artifacts/ios/_infra/telemetry/metrics.csv"
          if [[ ! -f "$csv" ]]; then
            echo "telemetry gate failed: missing $csv"
            exit 1
          fi
          header=$(head -n 1 "$csv")
          if [[ "$header" != "$expected_header" ]]; then
            echo "telemetry gate failed: unexpected CSV header"
            echo "expected: $expected_header"
            echo "actual:   $header"
            exit 1
          fi
          line_count=$(wc -l < "$csv")
          if [[ "$line_count" -le 2 ]]; then
            echo "telemetry gate failed: expected multiple data rows, found $((line_count-1))"
            exit 1
          fi
          code_file="artifacts/ios/_infra/telemetry/monitor.exitcode"
          if [[ ! -f "$code_file" ]]; then
            echo "telemetry gate failed: monitor exit code missing"
            exit 1
          fi
          code=$(cat "$code_file")
          if [[ "$code" == "3" ]]; then
            if [[ "${GITHUB_REF_TYPE}" == "tag" || "${GITHUB_REF_NAME}" == release/* ]]; then
              echo "telemetry gate failed: app process disappearance/restart detected on release flow; see artifacts/ios/_infra/telemetry/events.log"
              exit 1
            fi
            echo "telemetry gate warning: app process disappearance/restart detected (non-release flow); see artifacts/ios/_infra/telemetry/events.log"
            exit 0
          fi
          if [[ "$code" != "0" ]]; then
            echo "telemetry gate failed: monitor exited with code $code"
            exit 1
          fi

      - name: Collect simulator diagnostics on failure (${{ matrix.group.name }})
        if: failure()
        run: |
          set -euo pipefail
          mkdir -p artifacts/ios/_infra/simulator
          simulator_log_lookback="${IOS_SIMULATOR_LOG_LOOKBACK:-15m}"
          if [[ -n "${{ steps.simulator.outputs.udid }}" ]]; then
            # Keep lookback bounded while covering a full grouped Maestro run in typical CI timing.
            xcrun simctl spawn "${{ steps.simulator.outputs.udid }}" log show --last "$simulator_log_lookback" --style compact > artifacts/ios/_infra/simulator/device.log 2>&1 || true
            xcrun simctl diagnose "${{ steps.simulator.outputs.udid }}" > artifacts/ios/_infra/simulator/diagnose.log 2>&1 || true
          fi
          xcrun simctl list devices > artifacts/ios/_infra/simulator/devices.txt 2>&1 || true
          xcrun simctl list runtimes > artifacts/ios/_infra/simulator/runtimes.txt 2>&1 || true

      - name: Upload iOS failure diagnostics (${{ matrix.group.name }})
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-maestro-failure-${{ matrix.group.name }}
          path: |
            artifacts/ios/_infra/telemetry/events.log
            artifacts/ios/_infra/telemetry/monitor-run.log
            artifacts/ios/_infra/telemetry/monitor.exitcode
            artifacts/ios/_infra/simulator/**
            artifacts/ios/_infra/xcodebuild/**
          if-no-files-found: warn

      - name: Shutdown and delete simulator
        if: always()
        run: |
          if [[ -n "${{ steps.simulator.outputs.udid }}" ]]; then
            xcrun simctl shutdown "${{ steps.simulator.outputs.udid }}" || true
            xcrun simctl delete "${{ steps.simulator.outputs.udid }}" || true
          fi

  ios-maestro-aggregate:
    name: iOS | Maestro aggregate
    runs-on: ubuntu-latest
    needs: ios-maestro-tests
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CI_SHA }}

      - name: Download all per-group artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ios-maestro-*
          path: downloaded-artifacts
          merge-multiple: false

      - name: Aggregate evidence
        run: |
          set -euo pipefail
          mkdir -p artifacts/ios/_combined/flows

          # Re-root per-flow artifacts from group directories
          for group_dir in downloaded-artifacts/ios-maestro-*/; do
            group_name="$(basename "$group_dir" | sed 's/^ios-maestro-//')"

            # Process flow directories
            if [[ -d "$group_dir/artifacts/ios" ]]; then
              for flow_dir in "$group_dir/artifacts/ios"/*/; do
                flow_name="$(basename "$flow_dir")"
                # Skip _infra directory at this level
                if [[ "$flow_name" == "_infra" ]]; then
                  continue
                fi
                if [[ -d "$flow_dir" ]]; then
                  cp -r "$flow_dir" "artifacts/ios/_combined/flows/$flow_name"
                fi
              done

              # Copy infra diagnostics
              if [[ -d "$group_dir/artifacts/ios/_infra" ]]; then
                mkdir -p "artifacts/ios/_infra"
                cp -r "$group_dir/artifacts/ios/_infra"/* "artifacts/ios/_infra/" 2>/dev/null || true
              fi
            fi
          done

      - name: Merge JUnit reports
        run: |
          set -euo pipefail
          python3 <<'MERGE'
          import xml.etree.ElementTree as ET
          import glob
          import json
          import os

          combined = ET.Element("testsuites")
          total_tests = 0
          total_failures = 0
          total_errors = 0
          total_time = 0.0
          flow_summaries = []

          for junit_path in sorted(glob.glob("artifacts/ios/_combined/flows/*/junit.xml")):
              flow_name = os.path.basename(os.path.dirname(junit_path))
              try:
                  tree = ET.parse(junit_path)
                  root = tree.getroot()
                  if root.tag == "testsuites":
                      for suite in root:
                          suite.set("name", f"{flow_name}/{suite.get('name', 'unknown')}")
                          combined.append(suite)
                          total_tests += int(suite.get("tests", "0"))
                          total_failures += int(suite.get("failures", "0"))
                          total_errors += int(suite.get("errors", "0"))
                          total_time += float(suite.get("time", "0"))
                  elif root.tag == "testsuite":
                      root.set("name", f"{flow_name}/{root.get('name', 'unknown')}")
                      combined.append(root)
                      total_tests += int(root.get("tests", "0"))
                      total_failures += int(root.get("failures", "0"))
                      total_errors += int(root.get("errors", "0"))
                      total_time += float(root.get("time", "0"))
                  flow_summaries.append({"flow": flow_name, "status": "parsed", "tests": total_tests})
              except Exception as e:
                  flow_summaries.append({"flow": flow_name, "status": f"error: {e}"})

          combined.set("tests", str(total_tests))
          combined.set("failures", str(total_failures))
          combined.set("errors", str(total_errors))
          combined.set("time", f"{total_time:.3f}")

          out_dir = "artifacts/ios/_combined"
          tree = ET.ElementTree(combined)
          tree.write(os.path.join(out_dir, "junit-merged.xml"), xml_declaration=True, encoding="unicode")

          # Summary JSON
          summary = {
              "totalTests": total_tests,
              "totalFailures": total_failures,
              "totalErrors": total_errors,
              "totalTimeSeconds": round(total_time, 3),
              "flows": flow_summaries,
          }
          with open(os.path.join(out_dir, "summary.json"), "w") as f:
              json.dump(summary, f, indent=2)

          # Timing summary - aggregate from all flows
          timing_entries = []
          for timing_path in sorted(glob.glob("artifacts/ios/_combined/flows/*/timing.json")):
              try:
                  with open(timing_path) as f:
                      timing_entries.append(json.load(f))
              except Exception:
                  pass

          # Also include group-level timing
          group_timing = []
          for group_timing_path in sorted(glob.glob("artifacts/ios/_infra/*/timing.json")):
              try:
                  with open(group_timing_path) as f:
                      data = json.load(f)
                      data["source"] = "group"
                      group_timing.append(data)
              except Exception:
                  pass

          with open(os.path.join(out_dir, "timing-summary.json"), "w") as f:
              json.dump({
                  "flows": timing_entries,
                  "groups": group_timing
              }, f, indent=2)

          print(f"Merged {len(flow_summaries)} flows: {total_tests} tests, {total_failures} failures, {total_errors} errors")
          MERGE

      - name: Run connectivity validation summary
        if: always()
        run: |
          set -euo pipefail
          python3 <<'VALIDATE'
          import json
          import glob
          import sys

          validations = []
          all_valid = True

          for path in sorted(glob.glob("artifacts/ios/_combined/flows/*/connectivity-validation.json")):
              try:
                  with open(path) as f:
                      v = json.load(f)
                      validations.append(v)
                      if not v.get("valid", True):
                          all_valid = False
              except Exception as e:
                  validations.append({"flow": path, "valid": False, "errors": [str(e)]})
                  all_valid = False

          summary = {
              "allValid": all_valid,
              "flowCount": len(validations),
              "validations": validations,
          }

          with open("artifacts/ios/_combined/connectivity-summary.json", "w") as f:
              json.dump(summary, f, indent=2)

          if not all_valid:
              print("::warning::Connectivity validation failed for some flows")
              for v in validations:
                  if not v.get("valid", True):
                      print(f"  FAIL: {v.get('flow', 'unknown')} - {v.get('errors', [])}")

          print(json.dumps(summary, indent=2))
          VALIDATE

      - name: Upload combined evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-maestro-evidence
          path: |
            artifacts/ios/_combined/**
            artifacts/ios/_infra/**
          if-no-files-found: warn

      - name: Create evidence archive on tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          cd artifacts/ios
          zip -qry ../../ios-maestro-evidence.zip _combined/ _infra/ 2>/dev/null || \
          zip -qry ../../ios-maestro-evidence.zip _combined/

      - name: Upload evidence archive on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: ios-maestro-evidence-zip
          path: ios-maestro-evidence.zip
          if-no-files-found: warn

  ios-package-altstore:
    name: iOS | Package IPA
    runs-on: macos-latest
    needs: ios-prepare

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CI_SHA }}
          fetch-depth: 50

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Resolve app version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && -n "${GITHUB_REF_NAME}" ]]; then
            APP_VERSION="${GITHUB_REF_NAME}"
          else
            APP_VERSION="$(git describe --tags --exact-match 2>/dev/null || true)"
            if [[ -z "$APP_VERSION" ]]; then
              APP_VERSION="$(node -p "require('./package.json').version" 2>/dev/null || true)"
            fi
          fi
          if [[ -z "$APP_VERSION" ]]; then
            APP_VERSION="0.0.${GITHUB_RUN_NUMBER}"
          fi
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV

      - name: Download prepared iOS workspace
        uses: actions/download-artifact@v4
        with:
          name: ios-prepared-workspace
          path: .

      - name: Ensure CocoaPods scripts are executable
        run: |
          set -euo pipefail
          find ios/App/Pods/Target\ Support\ Files -name "*.sh" -type f -exec chmod +x {} +

      - name: Build unsigned iOS device app
        run: |
          set -euo pipefail
          mkdir -p ios/build
          mkdir -p artifacts/ios/_infra/xcodebuild
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            2>&1 | tee artifacts/ios/_infra/xcodebuild/build-device-release.log

      - name: Package iOS IPA
        run: |
          set -euo pipefail
          IPA_BASENAME="c64commander-${APP_VERSION}-ios"
          rm -rf ios/build/Payload
          mkdir -p ios/build/Payload
          cp -R ios/build/Build/Products/Release-iphoneos/App.app ios/build/Payload/App.app
          (
            cd ios/build
            zip -qry "${IPA_BASENAME}.ipa" Payload
          )
          sha256sum "ios/build/${IPA_BASENAME}.ipa" > "ios/build/${IPA_BASENAME}.ipa.sha256"

      - name: Upload iOS IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: |
            ios/build/c64commander-${{ env.APP_VERSION }}-ios.ipa
            ios/build/c64commander-${{ env.APP_VERSION }}-ios.ipa.sha256
          if-no-files-found: error

      - name: Upload iOS package diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-package-failure
          path: |
            artifacts/ios/_infra/xcodebuild/**
          if-no-files-found: warn

      - name: Ensure GitHub release exists
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release already exists for $TAG"
          else
            if [[ "$TAG" == *-rc* ]]; then
              gh release create "$TAG" --target "$GITHUB_SHA" --verify-tag --prerelease --generate-notes
            else
              gh release create "$TAG" --target "$GITHUB_SHA" --verify-tag --generate-notes
            fi
          fi

      - name: Publish iOS IPA on tags
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "${GITHUB_REF_NAME}" \
            "ios/build/c64commander-${APP_VERSION}-ios.ipa" \
            "ios/build/c64commander-${APP_VERSION}-ios.ipa.sha256" \
            --clobber

  ios-package-paid:
    name: iOS | Package paid signing
    runs-on: macos-latest
    needs: ios-prepare
    if: vars.IOS_PAID_SIGNING_ENABLED == 'true'
    # Required repository variables/secrets when enabling this lane:
    # - vars.IOS_PAID_SIGNING_ENABLED=true
    # - secrets.IOS_BUILD_CERTIFICATE_BASE64
    # - secrets.IOS_P12_PASSWORD
    # - secrets.IOS_PROVISIONING_PROFILE_BASE64
    # - secrets.IOS_TEAM_ID
    # - secrets.IOS_SIGNING_IDENTITY

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CI_SHA }}

      - name: Download prepared iOS workspace
        uses: actions/download-artifact@v4
