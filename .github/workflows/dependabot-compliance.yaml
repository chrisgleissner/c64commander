name: dependabot-compliance

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  refresh-notices:
    name: Dependabot | Refresh notices
    if: github.actor == 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh compliance artifacts
        run: npm run notices:generate

      - name: Commit refreshed notices
        run: |
          set -euo pipefail
          if git diff --quiet -- THIRD_PARTY_NOTICES.md; then
            echo "No compliance artifact drift detected"
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add THIRD_PARTY_NOTICES.md
          git commit -m 'ci: refresh compliance artifacts'
          git push
