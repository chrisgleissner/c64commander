name: perf-nightly

on:
  schedule:
    - cron: "15 4 * * *"
  workflow_dispatch:
    inputs:
      profile:
        description: Perf profile to execute
        required: true
        default: manual-extended
        type: choice
        options:
          - smoke
          - nightly
          - manual-extended

concurrency:
  group: perf-nightly
  cancel-in-progress: true

jobs:
  hvsc-web-nightly:
    name: Perf | Nightly HVSC web benchmark
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json', 'bun.lockb') }}

      - name: Cache HVSC archives
        uses: actions/cache@v4
        with:
          path: ~/.cache/c64commander/hvsc
          key: hvsc-perf-archives-${{ runner.os }}-hvsc84-v1

      - name: Prepare HVSC perf archives
        run: node scripts/hvsc/prepare-perf-archives.mjs --out=ci-artifacts/hvsc-performance/archive-preparation.json --write-env="$GITHUB_ENV"

      - name: Resolve perf profile
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "HVSC_PERF_PROFILE=${{ inputs.profile }}" >> "$GITHUB_ENV"
          else
            echo "HVSC_PERF_PROFILE=nightly" >> "$GITHUB_ENV"
          fi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run HVSC microbenchmarks
        run: npm run test:bench

      - name: Run HVSC node data-path perf suite
        run: npm run test:perf:node:nightly

      - name: Collect HVSC full scenario summary
        run: npm run test:perf:nightly

      - name: Collect HVSC secondary summary
        run: npm run test:perf:secondary:nightly

      - name: Apply optional perf budgets
        if: env.HVSC_PERF_PROFILE != 'smoke'
        env:
          HVSC_PERF_SUMMARY_FILE: ci-artifacts/hvsc-performance/web/web-secondary-${{ env.HVSC_PERF_PROFILE }}.json
        run: npm run test:perf:assert:web

      - name: Upload perf artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hvsc-perf-${{ env.HVSC_PERF_PROFILE }}
          path: ci-artifacts/hvsc-performance/**
