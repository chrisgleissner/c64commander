    javaLauncher.set(javaToolchains.launcherFor {
        languageVersion = JavaLanguageVersion.of(21)
    })
}

tasks.register('downloadHvscTestFixture') {
    group = 'verification'
    description = 'Downloads the real HVSC archive to the local cache used by Android JVM tests and verifies its checksum.'

    doLast {
        if (!hvscArchiveCacheDir.exists() && !hvscArchiveCacheDir.mkdirs()) {
            throw new GradleException("Failed to create HVSC cache directory: ${hvscArchiveCacheDir}")
        }

        def archiveFile = new File(hvscArchiveCacheDir, hvscArchiveName)
        if (!archiveFile.exists()) {
            logger.lifecycle("Downloading HVSC fixture from ${hvscArchiveUrl} to ${archiveFile}")
            new URL(hvscArchiveUrl).withInputStream { input ->
                archiveFile.withOutputStream { output ->
                    output << input
                }
            }
        }

        def actualSha256 = sha256Of(archiveFile)
        if (actualSha256 != hvscArchiveSha256) {
            throw new GradleException(
                "HVSC fixture checksum mismatch for ${archiveFile}. Expected ${hvscArchiveSha256}, got ${actualSha256}"
            )
        }

        logger.lifecycle("HVSC fixture ready: ${archiveFile} (${archiveFile.length()} bytes, sha256=${actualSha256})")
    }
}

