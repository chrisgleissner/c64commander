def hvscArchiveUrl = "https://hvsc.sannic.nl/HVSC%2084/HVSC_84-all-of-them.7z"
def hvscArchiveSha256 = "9ed41b3a8759af5e1489841cd62682e471824892eabf648d913b0c9725a4d6d3"
def hvscArchiveCacheDir = new File(System.getProperty("user.home"), ".cache/c64commander/hvsc")
def upstream7zipSourceUrl = "https://www.7-zip.org/a/7z2600-src.tar.xz"
def upstream7zipSourceSha256 = "3e596155744af055a77fc433c703d54e3ea9212246287b5b1436a6beac060f16"
def upstream7zipGeneratedJniLibsBaseDir = new File(buildDir, "generated/jniLibs/upstream7zip")
def upstream7zipWorkBaseDir = new File(buildDir, "intermediates/upstream7zip")
def upstream7zipBuildScript = rootProject.file("scripts/build-upstream-7zip.sh")
def upstream7zipNdkVersion = "27.2.12479018"
def upstream7zipApiLevel = 24
def upstream7zipAllAbis = ["armeabi-v7a", "arm64-v8a", "x86", "x86_64"]
def upstream7zipReleaseAbis = ["armeabi-v7a", "arm64-v8a"]
