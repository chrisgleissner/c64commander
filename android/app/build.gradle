def loadAndroidLocalProperties = {
    def props = new Properties()
    def localPropsFile = rootProject.file("local.properties")
    if (localPropsFile.exists()) {
        localPropsFile.withInputStream { stream ->
            props.load(stream)
        }
    }
    return props
}

def normalizeAndroidPath = { String rawPath ->
    rawPath.replace('\\:', ':')
}

def resolveAndroidSdkDir = {
    def envSdkDir = System.getenv("ANDROID_SDK_ROOT") ?: System.getenv("ANDROID_HOME")
    if (envSdkDir) {
        return new File(envSdkDir)
    }

    def props = loadAndroidLocalProperties()
    def localSdkDir = props.getProperty("sdk.dir")
    if (localSdkDir) {
        return new File(normalizeAndroidPath(localSdkDir))
    }

    return new File(System.getProperty("user.home"), "Android/Sdk")
}

def resolveAndroidNdkDir = {
    def envNdkDir = System.getenv("ANDROID_NDK_ROOT") ?: System.getenv("ANDROID_NDK_HOME")
    if (envNdkDir) {
        return new File(envNdkDir)
    }

    def props = loadAndroidLocalProperties()
    def localNdkDir = props.getProperty("ndk.dir")
    if (localNdkDir) {
        return new File(normalizeAndroidPath(localNdkDir))
    }

    return new File(resolveAndroidSdkDir(), "ndk/${upstream7zipNdkVersion}")
}

def sha256Of = { File file ->
    def digest = MessageDigest.getInstance("SHA-256")
    file.withInputStream { stream ->
        byte[] buffer = new byte[8192]
        int read
        while ((read = stream.read(buffer)) != -1) {
            digest.update(buffer, 0, read)
        }
    }
    return digest.digest().collect { String.format('%02x', it) }.join()
}

def keystoreProps = new Properties()
def keyPropsFile = rootProject.file("key.properties")

if (keyPropsFile.exists()) {
    keyPropsFile.withInputStream { stream ->
        keystoreProps.load(stream)
    }
}

logger.lifecycle("Signing config keys loaded: ${keystoreProps.keySet()}")

def resolveAppVersionName = { ->
    def envVersion = System.getenv("VERSION_NAME") ?: System.getenv("VITE_APP_VERSION")
    if (envVersion) return envVersion
    def refType = System.getenv("GITHUB_REF_TYPE")
    def refName = System.getenv("GITHUB_REF_NAME")
    if (refType == "tag" && refName) return refName
    try {
        def tag = "git describe --tags --exact-match".execute(null, rootDir).text.trim()
        if (tag) return tag
    } catch (Exception error) {
        logger.warn("Failed to derive Android versionName from git tag; falling back to package.json version", error)
    }
    def pkgFile = rootProject.file("../package.json")
    if (pkgFile.exists()) {
        def pkg = new JsonSlurper().parse(pkgFile)
        if (pkg?.version) return pkg.version.toString()
    }
    return "0.0.0"
}

def resolveAppVersionCode = { ->
    def envVersionCode = System.getenv("VERSION_CODE")
    if (envVersionCode) return envVersionCode.toInteger()
    def runNumber = System.getenv("GITHUB_RUN_NUMBER")
    if (runNumber) return 1000 + runNumber.toInteger()
    try {
        def commitCount = "git rev-list --count HEAD".execute(null, rootDir).text.trim()
        if (commitCount) return 1000 + commitCount.toInteger()
    } catch (Exception error) {
        logger.warn("Failed to derive Android versionCode from git commit count; falling back to default versionCode", error)
    }
    return 2
}

android {
    namespace "uk.gleissner.c64commander"
    compileSdk rootProject.ext.compileSdkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging true
        }
    }

    defaultConfig {
        applicationId "uk.gleissner.c64commander"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        def envVersionName = resolveAppVersionName()
        versionCode resolveAppVersionCode()
        versionName (envVersionName)
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
        logger.lifecycle("Resolved versionCode=${versionCode}, versionName=${versionName}")
    }

    sourceSets {
        debug {
            jniLibs.srcDirs += [upstream7zipGeneratedJniLibsDirForVariant("debug")]
        }
        minifiedDebug {
            jniLibs.srcDirs += [upstream7zipGeneratedJniLibsDirForVariant("minifiedDebug")]
        }
        release {
            jniLibs.srcDirs += [upstream7zipGeneratedJniLibsDirForVariant("release")]
        }
        androidTest {
            assets.srcDirs += ['src/test/fixtures']
        }
    }

    signingConfigs {
        release {
            def isReleaseBuild = gradle.startParameter.taskNames.any { it.toLowerCase().contains("release") }
            def storeFilePathValue = (System.getenv("KEYSTORE_STORE_FILE") ?: keystoreProps["storeFile"] ?: keystoreProps["KEYSTORE_STORE_FILE"] ?: "../keystore/release.keystore")?.toString()
            def storePasswordValue = (System.getenv("KEYSTORE_STORE_PASSWORD") ?: "")?.toString()
            def keyAliasValue = (System.getenv("KEYSTORE_KEY_ALIAS") ?: keystoreProps["keyAlias"] ?: keystoreProps["KEYSTORE_KEY_ALIAS"] ?: "c64commander")?.toString()
            def keyPasswordValue = (System.getenv("KEYSTORE_KEY_PASSWORD") ?: storePasswordValue ?: "")?.toString()

            if (isReleaseBuild) {
                if (!storeFilePathValue) {
                    throw new RuntimeException("Missing keystore file path. Set KEYSTORE_STORE_FILE or storeFile.")
                }
                if (!storePasswordValue) {
                    throw new RuntimeException("Missing keystore password. Set KEYSTORE_STORE_PASSWORD or storePassword.")
                }
                if (!keyAliasValue) {
                    throw new RuntimeException("Missing key alias. Set KEYSTORE_KEY_ALIAS or keyAlias.")
                }
                if (!keyPasswordValue) {
                    throw new RuntimeException("Missing key password. Set KEYSTORE_KEY_PASSWORD or keyPassword.")
                }

                def resolvedStoreFile = file(storeFilePathValue).absoluteFile
                if (!resolvedStoreFile.exists()) {
                    throw new RuntimeException("Keystore not found at: ${resolvedStoreFile}")
                }

                logger.lifecycle("Signing config: storeFileExists=${resolvedStoreFile.exists()}, storePasswordSet=${storePasswordValue != null}, keyAliasSet=${keyAliasValue != null}, keyPasswordSet=${keyPasswordValue != null}")

                storeFile = resolvedStoreFile
                storePassword = storePasswordValue
                keyAlias = keyAliasValue
                keyPassword = keyPasswordValue
                storeType = "PKCS12"
            }
        }
    }
    buildTypes {
        debug {
            ndk {
                abiFilters "armeabi-v7a", "arm64-v8a", "x86", "x86_64"
            }
        }
        minifiedDebug {
            initWith(debug)
            minifyEnabled true
            shrinkResources false
            matchingFallbacks = ['debug']
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
        release {
            minifyEnabled true
            shrinkResources true
            ndk {
                abiFilters "armeabi-v7a", "arm64-v8a"
            }
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }

    applicationVariants.all { variant ->
        variant.outputs.all { output ->
            if (!output.hasProperty('outputFileName')) return
            def versionNameValue = variant.versionName ?: resolveAppVersionName()
            def suffix = variant.buildType.name == 'debug' ? '-debug' : ''
            if (output.outputFileName?.toString()?.endsWith('.apk')) {
                output.outputFileName = "c64commander-${versionNameValue}${suffix}.apk"
            }
        }
    }
    testOptions {
        unitTests.returnDefaultValues = true
        unitTests.all {
            jacoco {
                enabled = true
                includeNoLocationClasses = true
                excludes = [
                    'jdk.internal.*',
                    'java.*',
                    'javax.*',
                    'sun.*',
                    'com.sun.*',
                ]
            }
        }
    }
}

upstream7zipVariantAbis.each { variantName, abis ->
    def capitalizedVariantName = variantName.substring(0, 1).toUpperCase() + variantName.substring(1)
    def taskName = "buildUpstream7zip${capitalizedVariantName}AndroidBinaries"
    def outputDir = upstream7zipGeneratedJniLibsDirForVariant(variantName)
    def workDir = upstream7zipWorkDirForVariant(variantName)

    tasks.register(taskName, Exec) {
        group = 'build'
        description = "Builds pinned upstream 7-Zip Android executables for the ${variantName} variant."

        inputs.file(upstream7zipBuildScript)
        inputs.property('abis', abis.join(','))
        inputs.property('sourceUrl', upstream7zipSourceUrl)
        inputs.property('sourceSha256', upstream7zipSourceSha256)
        inputs.property('apiLevel', upstream7zipApiLevel.toString())
        inputs.property('ndkVersion', upstream7zipNdkVersion)
        inputs.property('ndkDirPath', resolveAndroidNdkDir().absolutePath)
        outputs.dir(outputDir)
        outputs.cacheIf { true }

        doFirst {
            if (!upstream7zipBuildScript.exists()) {
                throw new GradleException("Missing upstream 7-Zip build script: ${upstream7zipBuildScript}")
            }
            def ndkDir = resolveAndroidNdkDir()
            if (!ndkDir.exists()) {
                throw new GradleException("Android NDK not found for upstream 7-Zip build: ${ndkDir}")
            }
            outputDir.mkdirs()
            commandLine(
                'bash',
                upstream7zipBuildScript.absolutePath,
                ndkDir.absolutePath,
                workDir.absolutePath,
                outputDir.absolutePath,
                upstream7zipSourceUrl,
                upstream7zipSourceSha256,
                upstream7zipApiLevel.toString(),
                *abis,
            )
        }
    }

    tasks.matching { it.name == "pre${capitalizedVariantName}Build" }.configureEach {
        dependsOn(tasks.named(taskName))
    }
}

