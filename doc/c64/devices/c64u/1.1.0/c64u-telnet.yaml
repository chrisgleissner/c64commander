telnet:
  general:
    base_url: http://c64u
    host: c64u
    device_type: "C64 Ultimate"
    firmware_version: 1.1.0
    rest_api_version: "0.1"
    requested_test_data_paths:
      - /USB0/test-data
      - /USB1/test-data
    resolved_test_data_path: /USB1/test-data
  initial_action_menus:
    screen_context: "initial telnet screen with no selected filesystem entry"
    opened_with: F1
    action_menu:
      items:
        - Power & Reset
        - Built-in Drive A
        - Built-in Drive B
        - Software IEC
        - Printer
        - Configuration
        - Streams
        - Developer
        - Return to Main Menu
      default_item: "Power & Reset"
      submenus:
        Power & Reset:
          items:
            - Reset C64
            - Reboot C64
            - Reboot (Clr Mem)
            - Power OFF
            - Power Cycle
            - Save C64 Memory
            - Save REU Memory
          default_item: "Reset C64"
        Built-in Drive A:
          items:
            - Built-in Dri┐Turn Off
            - Reset
            - Switch to 1571
            - Switch to 1581
            - Insert Blank
          default_item: "Built-in Dri┐Turn Off"
        Built-in Drive B:
          items:
            - Built-in Dri┐Turn On
            - Switch to 1541
            - Switch to 1571
            - Switch to 1581
          default_item: "Built-in Dri┐Turn On"
        Software IEC:
          items:
            - Software IEC ┐Turn On
            - Reset
            - Set dir. here
          default_item: "Software IEC ┐Turn On"
        Printer:
          items:
            - Printer        ┐Flush/Eject
            - Reset
            - Turn On
          default_item: "Printer        ┐Flush/Eject"
        Configuration:
          items:
            - Save to Flash
            - Save to File
            - Configur┐Reset from Flash
            - Reset to Defaults
            - Clear Flash Config
          default_item: "Save to Flash"
        Streams:
          items:
            - Streams     ┐  VIC Stream
            - Audio Stream
          default_item: "Streams     ┐  VIC Stream"
        Developer:
          items:
            - Clear Debug Log
            - Save Debug Log
            - Save EDID to file
            - Developer┐  Debug Stream
          default_item: "Clear Debug Log"
  selected_directory_action_menus:
    screen_context: "filesystem browser with a directory selected and the action menu opened via function key"
    path: /USB1/test-data
    browser_path: /USB1/
    selected_entry: test-data
    opened_with: F1
    action_menu:
      items:
        - Create
        - Power & Reset
        - Built-in Drive A
        - Built-in Drive B
        - Software IEC
        - UltiCopy
        - Tape
        - Printer
        - Configuration
        - Streams
        - Developer
        - Return to Main Menu
      default_item: Create
      submenus:
        Create:
          items:
            - D64 Image
            - G64 Image
            - D71 Image
            - G71 Image
            - D81 Image
            - D81 (81 Tr.)
            - DNP Image
            - Directory
          default_item: "D64 Image"
        Power & Reset:
          items:
            - Power & Re┐Reset C64
            - Reboot C64
            - Reboot (Clr Mem)
            - Power OFF
            - Power Cycle
            - Save C64 Memory
            - Save REU Memory
            - Save Cartridge
            - Save MP3 Drv D
          default_item: "Power & Re┐Reset C64"
        Built-in Drive A:
          items:
            - Built-in Dri┐Turn Off
            - Reset
            - Switch to 1571
            - Switch to 1581
            - Insert Blank
          default_item: "Built-in Dri┐Turn Off"
        Built-in Drive B:
          items:
            - Built-in Dri┐Turn On
            - Switch to 1541
            - Switch to 1571
            - Switch to 1581
          default_item: "Built-in Dri┐Turn On"
        Software IEC:
          items:
            - Software IEC ┐Turn On
            - Reset
            - Set dir. here
          default_item: "Software IEC ┐Turn On"
        UltiCopy:
          items:
            - UltiCopy          ┐Drive 8
            - Drive 9
            - Drive 10
            - Drive 11
          default_item: "UltiCopy          ┐Drive 8"
        Tape:
          items:
            - Tape   ┐Sample tape to TAP
            - Capture save to TAP
          default_item: "Tape   ┐Sample tape to TAP"
        Printer:
          items:
            - Printer        ┐Flush/Eject
            - Reset
            - Turn On
          default_item: "Printer        ┐Flush/Eject"
        Configuration:
          items:
            - Save to Flash
            - Save to File
            - Configur┐Reset from Flash
            - Reset to Defaults
            - Clear Flash Config
          default_item: "Save to Flash"
        Streams:
          items:
            - Streams     ┐  VIC Stream
            - Audio Stream
          default_item: "Streams     ┐  VIC Stream"
        Developer:
          items:
            - Clear Debug Log
            - Save Debug Log
            - Save EDID to file
            - Developer┐  Debug Stream
          default_item: "Clear Debug Log"
  filesystem_context_menus:
    screen_context: "filesystem browser with a selected entry and its ENTER-opened context menu"
    selected_directory:
      path: /USB1/test-data
      browser_path: /USB1/
      selected_entry: test-data
      menu_items:
        - Enter
        - Rename
        - Delete
      default_item: Enter
    menu_definitions:
      archive_7z:
        representative_file: /USB1/test-data/SID/HVSC_77-all-of-them.7z
        items:
          - Rename
          - Delete
        default_item: Rename
      crt:
        representative_file: /USB1/test-data/crt/266_Cabal_1989_Ocean.crt
        items:
          - Run Cart
          - Copy to Flash
          - View
          - Rename
          - Delete
        default_item: "Run Cart"
      d64:
        representative_file: "/USB1/test-data/d64/Boulder Dash 1 (Nostalgia).d64"
        items:
          - Run Disk
          - Mount Disk
          - Mount Disk Read Only
          - Mount Disk Unlinked
          - Mount Disk on B
          - Mount Disk R/O on B
          - Mount Disk Unl. on B
          - Load into MP3 Drv D
          - View
          - Rename
          - Delete
        default_item: "Run Disk"
      d71:
        representative_file: /USB1/test-data/d71/10_Years_HVSC.d71
        items:
          - Run Disk
          - Mount Disk
          - Mount Disk Read Only
          - Mount Disk Unlinked
          - Mount Disk on B
          - Mount Disk R/O on B
          - Mount Disk Unl. on B
          - Rename
          - Delete
        default_item: "Run Disk"
      d81:
        representative_file: /USB1/test-data/d81/10_Years_HVSC.d81
        items:
          - Run Disk
          - Mount Disk
          - Mount Disk Read Only
          - Mount Disk Unlinked
          - Mount Disk on B
          - Mount Disk R/O on B
          - Mount Disk Unl. on B
          - Rename
          - Delete
        default_item: "Run Disk"
      mod:
        representative_file: /USB1/test-data/mod/jukebox_packtune.mod
        items:
          - Play MOD
          - Load into REU
          - Preload on Startup
          - View
          - Rename
          - Delete
        default_item: "Play MOD"
      prg:
        representative_file: /USB1/test-data/prg/1k-mini-bdash-note.prg
        items:
          - Run
          - Load
          - DMA
          - View
          - Rename
          - Delete
        default_item: Run
      sid:
        representative_file: /USB1/test-data/SID/10_Orbyte.sid
        items:
          - Play Main Tune
          - Show Info
          - View
          - Rename
          - Delete
        default_item: "Play Main Tune"
  commoserve:
    screen_context: "CommoServe file search dialog opened via F6"
    search_form:
      title: "CommoServe File Search"
      fields:
        Name:
          kind: text
          initial_value: ""
        Group:
          kind: text
          initial_value: ""
        Handle:
          kind: text
          initial_value: ""
        Event:
          kind: text
          initial_value: ""
        Category:
          kind: dropdown
          initial_value: ""
          options:
            - Apps
            - Demos
            - Games
            - Graphics
            - Music
        Date:
          kind: dropdown
          initial_value: ""
          options:
            - "1980"
            - "1981"
            - "1982"
            - "1983"
            - "1984"
            - "1985"
            - "1986"
            - "1987"
            - "1988"
            - "1989"
            - "1990"
            - "1991"
            - "1992"
            - "1993"
            - "1994"
            - "1995"
            - "1996"
        Type:
          kind: dropdown
          initial_value: ""
          options:
            - crt
            - d64
            - d71
            - d81
            - sid
            - t64
            - tap
        Sort:
          kind: dropdown
          initial_value: ""
          options:
            - Name
            - Year
        Order:
          kind: dropdown
          initial_value: ""
          options:
            - Ascending
            - Descending
      actions:
        - Submit
