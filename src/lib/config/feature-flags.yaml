# Authoritative feature flag registry.
#
# This YAML file is the only place where feature flags are authored.
# It is compiled at build time by scripts/compile-feature-flags.mjs into
# src/lib/config/featureFlagsRegistry.generated.ts and consumed by the
# runtime resolver in src/lib/config/featureFlags.ts.
#
# Semantics:
#   enabled          registry default when no explicit user override exists
#   visible_to_user  whether the row is shown in standard (non-developer) Settings
#   developer_only   hides the row from standard users; requires visible_to_user: false
#   group            logical grouping key for Settings sections (must exist under groups)
#
# Standard-user toggleability is derived, not authored:
#   visible_to_user && !developer_only
#
# Invariants enforced at compile time:
#   - feature ids are unique snake_case
#   - every feature.group matches a groups key
#   - developer_only: true requires visible_to_user: false

version: 1

groups:
  stable:
    label: Stable Features
    description: Fully supported and production-ready capabilities.
  experimental:
    label: Experimental Features
    description: Unstable or rollout-controlled capabilities.

features:
  - id: hvsc_enabled
    enabled: true
    visible_to_user: true
    developer_only: false
    group: stable
    title: HVSC downloads
    description: Show the HVSC source in Add Items.

  - id: commoserve_enabled
    enabled: true
    visible_to_user: true
    developer_only: false
    group: stable
    title: CommoServe
    description: Show the CommoServe source in Add Items.

  - id: demo_mode_enabled
    enabled: false
    visible_to_user: true
    developer_only: false
    group: stable
    title: Demo Mode
    description: Allow the built-in simulated device mode in Settings and connection flows.

  - id: background_execution_enabled
    enabled: true
    visible_to_user: false
    developer_only: true
    group: experimental
    title: Background Execution
    description: Allow native background playback timing and auto-advance scheduling.

  - id: lighting_studio_enabled
    enabled: false
    visible_to_user: false
    developer_only: true
    group: experimental
    title: Lighting Studio
    description: Enable Lighting Studio entry points and dialog access.

  - id: remote_input_enabled
    enabled: false
    visible_to_user: false
    developer_only: true
    group: experimental
    title: Remote Input
    description: Enable the remote keyboard/joystick input sheet (couch remote for the C64).

  - id: ram_snapshots_enabled
    enabled: true
    visible_to_user: true
    developer_only: false
    group: stable
    title: RAM snapshots
    description: Show Save RAM and Load RAM actions on Home.

  - id: home_telnet_reu_snapshot_enabled
    enabled: false
    visible_to_user: false
    developer_only: true
    group: experimental
    title: REU Snapshots
    description: Enable Save REU and Restore REU Snapshot functionality on Home. Depends on the Telnet interface.

  - id: home_telnet_config_actions_enabled
    enabled: false
    visible_to_user: true
    developer_only: false
    group: experimental
    title: Home advanced config actions
    description: Show advanced Home config actions (file save/load and Clear Flash). Depends on the Telnet interface.

  - id: home_telnet_drive_actions_enabled
    enabled: false
    visible_to_user: true
    developer_only: false
    group: experimental
    title: Home drive shortcut actions
    description: Show drive shortcut actions on Home (drive reset, Soft IEC turn on/reset/set dir, drive B turn on). Depends on the Telnet interface.

  - id: home_telnet_printer_actions_enabled
    enabled: false
    visible_to_user: true
    developer_only: false
    group: experimental
    title: Home printer shortcut actions
    description: Show printer shortcut actions on Home (turn on, flush/eject, reset). Depends on the Telnet interface.

  - id: home_telnet_power_cycle_enabled
    enabled: false
    visible_to_user: true
    developer_only: false
    group: experimental
    title: Home power cycle action
    description: Show the Power Cycle quick action on Home. Depends on the Telnet interface.

  - id: home_telnet_clear_ram_reboot_enabled
    enabled: false
    visible_to_user: true
    developer_only: false
    group: experimental
    title: Home clear-RAM reboot action
    description: Show the Reboot (Clr Mem) quick action on Home. Depends on the Telnet interface.

  - id: keypad_input_enabled
    enabled: true
    visible_to_user: true
    developer_only: false
    group: experimental
    title: Keyboard and keypad navigation
    description: >-
      Drive the app with a hardware keyboard, remote, or keypad. Arrow/D-pad
      navigation, activation, and literal hardware-keyboard typing are enabled
      by default; numeric keypad T9 text entry remains reserved for keypad-first
      variants.
