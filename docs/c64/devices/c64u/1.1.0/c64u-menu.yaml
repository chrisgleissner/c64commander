config:
  general:
    schema_version: '0.3'
    device_type: C64 Ultimate
    menu_title: Commodore 64 Ultimate
    extraction_status: complete_for_supplied_menu_pages
    yaml_shape: Aligned with the REST YAML convention of config.general plus 
      config.categories; config.menu_tree captures menu hierarchy.
    notes:
    - This file mirrors the user-visible menu labels and visible selected 
      values.
    - It is a menu extraction, not yet a completed REST-to-menu mapping.
    - Selected values are preserved as visible values rather than converted to 
      natural English case.
    - System information is present in the root menu, but no detail page is 
      included here.
  menu_tree:
    label: Commodore 64 Ultimate
    items:
    - label: Disk file browser
      category: Disk file browser
    - label: CommoServe file search
      category: CommoServe file search
    - label: Memory & ROMs
      category: Memory & ROMs
    - label: Turbo boost
      category: Turbo boost
    - label: Video setup
      category: Video setup
    - label: Audio setup
      children:
      - label: Audio mixer
        category: Audio mixer
      - label: Speaker mixer
        category: Speaker mixer
      - label: SID sockets configuration
        category: SID sockets configuration
      - label: UltiSID configuration
        category: UltiSID configuration
      - label: SID addressing
        category: SID addressing
      - label: SID player behavior
        category: SID player behavior
    - label: Joystick & controllers
      category: Joystick & controllers
    - label: LED lighting
      category: LED lighting
    - label: Network services & timezone
      category: Network services & timezone
    - label: Wired network setup
      category: Wired network setup
    - label: Wi-Fi network setup
      category: Wi-Fi network setup
    - label: Modems
      category: Modems
    - label: Printers
      category: Printers
    - label: User interface
      category: User interface
    - label: Built-in drive A
      category: Built-in drive A
    - label: Built-in drive B
      category: Built-in drive B
    - label: System information
      category: System information
  categories:
