        "200":
          description: VCD timing capture.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "403":
          $ref: "#/components/responses/Forbidden"
        "501":
          $ref: "#/components/responses/NotImplemented"
  /v1/machine:input:
    get:
      tags: [Input]
      operationId: getInputState
      summary: Read REST-injected keyboard and joystick state.
      responses:
        "200":
          description: Current input state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InputStateResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "501":
          $ref: "#/components/responses/NotImplemented"
    post:
      tags: [Input]
      operationId: sendInputEvents
      summary: Apply keyboard and joystick input events.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InputBatch"
      responses:
        "200":
          description: Updated input state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InputStateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "412":
          $ref: "#/components/responses/PreconditionFailed"
        "500":
          $ref: "#/components/responses/ServerError"
        "501":
          $ref: "#/components/responses/NotImplemented"
