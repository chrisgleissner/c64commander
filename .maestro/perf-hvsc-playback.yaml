appId: uk.gleissner.c64commander
tags:
  - hvsc-perf
  - hvsc-perf-playback
  - device
env:
  LONG_TIMEOUT: ${LONG_TIMEOUT || "180000"}
  SHORT_TIMEOUT: ${SHORT_TIMEOUT || "5000"}
  TIMEOUT: ${TIMEOUT || "30000"}
---
- runFlow: subflows/launch-and-wait.yaml
- tapOn:
    text: "Play"
- extendedWaitUntil:
    visible: "Playlist"
    timeout: ${TIMEOUT}
- tapOn:
    id: "list-filter-input"
- eraseText
- inputText: "Commando"
- waitForAnimationToEnd
- tapOn:
    id: "playlist-play"
- extendedWaitUntil:
    visible: "Pause"
    timeout: ${LONG_TIMEOUT}
