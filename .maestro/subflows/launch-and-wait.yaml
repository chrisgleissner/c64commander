appId: uk.gleissner.c64commander
env:
  SHORT_TIMEOUT: ${SHORT_TIMEOUT || "10000"}
  TIMEOUT: ${TIMEOUT || "30000"}
  LONG_TIMEOUT: ${LONG_TIMEOUT || "60000"}
tags:
  - subflow
---
# Press Home first to dismiss any lingering notification shade or system overlay
# that may have been left by a previous Maestro run or ANR dialog.
- pressKey: Home
- launchApp:
    stopApp: true
- retry:
    maxRetries: 3
    commands:
      - runFlow:
          when:
            visible: "Continue in Demo Mode"
          file: continue-demo.yaml
      - tapOn:
          text: "Continue in Demo Mode"
          optional: true
      - tapOn:
          text: "Retry connection"
          optional: true
      - tapOn:
          text: "Save & Retry"
          optional: true
      - tapOn:
          text: "Done"
          optional: true
      - tapOn:
          text: "Got it"
          optional: true
      - tapOn:
          text: "Wait"
          optional: true
      - tapOn:
          text: "Close app"
          optional: true
      - tapOn:
          text: "Allow access"
          optional: true
      - tapOn:
          text: "Allow all the time"
          optional: true
      - tapOn:
          text: "Allow only while using the app"
          optional: true
      - tapOn:
          text: "Don't show again"
          optional: true
      - tapOn:
          text: "OK"
          optional: true
      - waitForAnimationToEnd
      - extendedWaitUntil:
          visible: "Home"
          timeout: ${LONG_TIMEOUT}
# Retry Android 16 "app compatibility" dialog dismissal because the modal can
# appear a moment after the Home tab renders and will block all WebView taps.
- retry:
    maxRetries: 3
    commands:
      - tapOn:
          text: "Don't show again"
          optional: true
      - tapOn:
          text: "OK"
          optional: true
      - waitForAnimationToEnd
