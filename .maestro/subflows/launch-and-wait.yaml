appId: uk.gleissner.c64commander
env:
  SHORT_TIMEOUT: ${SHORT_TIMEOUT || "10000"}
  TIMEOUT: ${TIMEOUT || "30000"}
  LONG_TIMEOUT: ${LONG_TIMEOUT || "60000"}
tags:
  - subflow
---
- launchApp:
    stopApp: true
- retry:
    maxRetries: 3
    commands:
      - runFlow:
          when:
            visible: "Continue in Demo Mode"
          file: continue-demo.yaml
      - tapOn:
          text: "Continue in Demo Mode"
          optional: true
      - tapOn:
          text: "Got it"
          optional: true
      - tapOn:
          text: "Wait"
          optional: true
      - tapOn:
          text: "Close app"
      - tapOn:
          text: "Allow access"
          optional: true
      - tapOn:
          text: "Allow all the time"
          optional: true
      - tapOn:
          text: "Allow only while using the app"
          optional: true
      - waitForAnimationToEnd
# The iOS home tab label is not consistently exposed to Maestro during initial
# launch. After launch, key off the home page content instead of the tab text.
- tapOn:
    text: "Home"
    optional: true
- tapOn:
    point: "8%,95%"
    optional: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Quick Config"
    timeout: ${LONG_TIMEOUT}
- takeScreenshot: home
