appId: uk.gleissner.c64commander
tags:
  - hvsc
  - slow
  - ci-critical
env:
  SHORT_TIMEOUT: ${SHORT_TIMEOUT || "5000"}
  TIMEOUT: ${TIMEOUT || "15000"}
  LONG_TIMEOUT: ${LONG_TIMEOUT || "15000"}
---
- runFlow: subflows/launch-and-wait.yaml
- tapOn:
    id: "tab-settings"
- extendedWaitUntil:
    visible: "Settings"
    timeout: ${SHORT_TIMEOUT}
- waitForAnimationToEnd
- swipe:
    start: 50%, 78%
    end: 50%, 28%
    duration: 400
- waitForAnimationToEnd
- tapOn:
    id: feature-flag-hvsc_enabled
    checked: false
    optional: true
- swipe:
    start: 50%, 78%
    end: 50%, 28%
    duration: 400
- waitForAnimationToEnd
- tapOn:
    id: feature-flag-hvsc_enabled
    checked: false
    optional: true
- swipe:
    start: 50%, 78%
    end: 50%, 28%
    duration: 400
- waitForAnimationToEnd
- tapOn:
    id: feature-flag-hvsc_enabled
    checked: false
    optional: true
- tapOn:
    id: "tab-play"
- extendedWaitUntil:
    visible: "Play Files"
    timeout: ${SHORT_TIMEOUT}
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      id: hvsc-download
    direction: DOWN
    timeout: ${LONG_TIMEOUT}
    visibilityPercentage: 50
    centerElement: true
- assertVisible:
    id: hvsc-download
- takeScreenshot: hvsc-controls
- assertVisible:
    id: hvsc-download
- assertVisible:
    id: hvsc-ingest
- takeScreenshot: hvsc-actions
- runFlow:
    when:
      visible: "Browse HVSC folders"
    file: subflows/hvsc-browse-assert.yaml
