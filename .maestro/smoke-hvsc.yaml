appId: uk.gleissner.c64commander
tags:
  - hvsc
  - slow
  - ci-critical
env:
  SHORT_TIMEOUT: ${SHORT_TIMEOUT || "5000"}
  TIMEOUT: ${TIMEOUT || "15000"}
  LONG_TIMEOUT: ${LONG_TIMEOUT || "15000"}
---
- runFlow: subflows/launch-and-wait.yaml
- tapOn:
    point: "75%,95%"
- extendedWaitUntil:
    visible: "Settings"
    timeout: ${SHORT_TIMEOUT}
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      text: "HVSC downloads"
    direction: DOWN
    timeout: ${TIMEOUT}
- tapOn:
    text: "HVSC downloads"
    checked: false
    optional: true
- tapOn:
    point: "25%,95%"
- extendedWaitUntil:
    visible: "Playlist"
    timeout: ${SHORT_TIMEOUT}
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      id: hvsc-download
    direction: DOWN
    timeout: ${LONG_TIMEOUT}
- assertVisible:
    id: hvsc-download
- takeScreenshot: hvsc-controls
- assertVisible:
    id: hvsc-download
- assertVisible:
    id: hvsc-ingest
- takeScreenshot: hvsc-actions
- runFlow:
    when:
      visible: "Browse HVSC folders"
    file: subflows/hvsc-browse-assert.yaml
