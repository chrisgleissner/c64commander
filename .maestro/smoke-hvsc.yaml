appId: uk.gleissner.c64commander
tags:
  - hvsc
  - slow
  - ci-critical
env:
  SHORT_TIMEOUT: ${SHORT_TIMEOUT || "5000"}
  TIMEOUT: ${TIMEOUT || "15000"}
  LONG_TIMEOUT: ${LONG_TIMEOUT || "15000"}
---
- runFlow: subflows/launch-and-wait.yaml
- tapOn:
    point: "75%,95%"
- extendedWaitUntil:
    visible: "Settings"
    timeout: ${SHORT_TIMEOUT}
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      id: feature-flag-hvsc_enabled
    direction: DOWN
    timeout: ${TIMEOUT}
    visibilityPercentage: 50
    centerElement: true
- retry:
    maxRetries: 3
    commands:
      - tapOn:
          id: feature-flag-hvsc_enabled
          checked: false
          optional: true
      - assertVisible:
          id: feature-flag-hvsc_enabled
          checked: true
- tapOn:
    point: "25%,95%"
- extendedWaitUntil:
    visible: "Playlist"
    timeout: ${SHORT_TIMEOUT}
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      text: "Download HVSC"
    direction: DOWN
    timeout: ${LONG_TIMEOUT}
    visibilityPercentage: 50
    centerElement: true
- assertVisible: "Download HVSC"
- takeScreenshot: hvsc-controls
- assertVisible: "Download HVSC"
- assertVisible: "Ingest HVSC"
- takeScreenshot: hvsc-actions
- runFlow:
    when:
      visible: "Browse HVSC folders"
    file: subflows/hvsc-browse-assert.yaml
