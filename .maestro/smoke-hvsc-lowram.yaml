appId: uk.gleissner.c64commander
tags:
  - ci-critical
  - hvsc-lowram
env:
  HVSC_INGEST_TIMEOUT: ${HVSC_INGEST_TIMEOUT || "900000"}
  SHORT_TIMEOUT: ${SHORT_TIMEOUT || "5000"}
  TIMEOUT: ${TIMEOUT || "15000"}
  LONG_TIMEOUT: ${LONG_TIMEOUT || "15000"}
---
- runFlow: subflows/launch-and-wait.yaml
- tapOn:
    id: "tab-settings"
- extendedWaitUntil:
    visible: "Settings"
    timeout: ${SHORT_TIMEOUT}
- waitForAnimationToEnd
- retry:
    maxRetries: 6
    commands:
      - swipe:
          start: 50%, 78%
          end: 50%, 28%
          duration: 400
      - waitForAnimationToEnd
      - assertVisible: "HVSC downloads"
      - tapOn:
          text: "HVSC downloads"
          checked: false
          optional: true
      - waitForAnimationToEnd
      - assertVisible: "HVSC downloads"
- tapOn:
    id: "tab-play"
- extendedWaitUntil:
    visible: "Play Files"
    timeout: ${SHORT_TIMEOUT}
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      text: "Download HVSC"
    direction: DOWN
    timeout: ${LONG_TIMEOUT}
    visibilityPercentage: 50
    centerElement: true
- assertVisible: "Download HVSC"
- tapOn: "Download HVSC"
- extendedWaitUntil:
    visible: "Status: Ready"
    timeout: ${HVSC_INGEST_TIMEOUT}
- assertVisible: "Ingested"
- assertNotVisible: "Ingested 0 of 0 songs"
- assertVisible: "Status: Ready"
- assertNotVisible: "HVSC download failed"
- takeScreenshot: hvsc-lowram-ingest-complete
