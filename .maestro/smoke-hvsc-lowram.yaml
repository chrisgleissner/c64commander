appId: uk.gleissner.c64commander
tags:
  - ci-critical
  - hvsc-lowram
env:
  HVSC_INGEST_TIMEOUT: ${HVSC_INGEST_TIMEOUT || "900000"}
  SHORT_TIMEOUT: ${SHORT_TIMEOUT || "5000"}
  TIMEOUT: ${TIMEOUT || "15000"}
  LONG_TIMEOUT: ${LONG_TIMEOUT || "15000"}
---
- runFlow: subflows/launch-and-wait.yaml
- tapOn:
    id: "tab-settings"
- extendedWaitUntil:
    visible: "Settings"
    timeout: ${SHORT_TIMEOUT}
- waitForAnimationToEnd
- swipe:
    start: 50%, 78%
    end: 50%, 28%
    duration: 400
- waitForAnimationToEnd
- tapOn:
    id: feature-flag-hvsc_enabled
    checked: false
    optional: true
- swipe:
    start: 50%, 78%
    end: 50%, 28%
    duration: 400
- waitForAnimationToEnd
- tapOn:
    id: feature-flag-hvsc_enabled
    checked: false
    optional: true
- swipe:
    start: 50%, 78%
    end: 50%, 28%
    duration: 400
- waitForAnimationToEnd
- tapOn:
    id: feature-flag-hvsc_enabled
    checked: false
    optional: true
- tapOn:
    id: "tab-play"
- extendedWaitUntil:
    visible: "Play Files"
    timeout: ${SHORT_TIMEOUT}
- waitForAnimationToEnd
- swipe:
    start: 50%, 86%
    end: 50%, 38%
    duration: 400
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      id: hvsc-download
    direction: DOWN
    speed: 80
    timeout: ${LONG_TIMEOUT}
    visibilityPercentage: 50
    centerElement: true
- assertVisible:
    id: hvsc-download
- tapOn:
    id: hvsc-download
- extendedWaitUntil:
    visible: "Status: Ready"
    timeout: ${HVSC_INGEST_TIMEOUT}
- assertVisible: "Ingested"
- assertNotVisible: "Ingested 0 of 0 songs"
- assertVisible: "Status: Ready"
- assertNotVisible: "HVSC download failed"
- takeScreenshot: hvsc-lowram-ingest-complete
