appId: uk.gleissner.c64commander
tags:
  - ci-critical
  - hvsc-lowram
env:
  HVSC_INGEST_TIMEOUT: ${HVSC_INGEST_TIMEOUT || "900000"}
  SHORT_TIMEOUT: ${SHORT_TIMEOUT || "5000"}
  TIMEOUT: ${TIMEOUT || "15000"}
  LONG_TIMEOUT: ${LONG_TIMEOUT || "15000"}
---
- runFlow: subflows/launch-and-wait.yaml
- tapOn:
    point: "75%,95%"
- extendedWaitUntil:
    visible: "Settings"
    timeout: ${SHORT_TIMEOUT}
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      id: hvsc-flag
    direction: DOWN
    timeout: ${TIMEOUT}
- tapOn:
    id: hvsc-flag
    checked: false
    optional: true
- tapOn:
    point: "25%,95%"
- extendedWaitUntil:
    visible: "Playlist"
    timeout: ${SHORT_TIMEOUT}
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      text: "No tracks in playlist yet."
    direction: DOWN
    speed: 80
    timeout: ${LONG_TIMEOUT}
- scrollUntilVisible:
    element:
      text: "HVSC"
    direction: DOWN
    speed: 80
    timeout: ${LONG_TIMEOUT}
- scrollUntilVisible:
    element:
      text: "Download HVSC"
    direction: DOWN
    speed: 80
    timeout: ${LONG_TIMEOUT}
- tapOn: "Download HVSC"
- extendedWaitUntil:
    visible: "Status: Ready"
    timeout: ${HVSC_INGEST_TIMEOUT}
- assertVisible: "Ingested"
- assertNotVisible: "Ingested 0 of 0 songs"
- assertVisible: "Status: Ready"
- assertNotVisible: "HVSC download failed"
- takeScreenshot: hvsc-lowram-ingest-complete
