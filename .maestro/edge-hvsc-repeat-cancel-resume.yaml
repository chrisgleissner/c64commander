appId: uk.gleissner.c64commander
tags:
  - edge
  - slow
  - hvsc
  - device
env:
  LONG_TIMEOUT: ${LONG_TIMEOUT || "20000"}
  SHORT_TIMEOUT: ${SHORT_TIMEOUT || "5000"}
  TIMEOUT: ${TIMEOUT || "15000"}
---
# edge-hvsc-repeat-cancel-resume: start HVSC ingest, cancel mid-extraction,
# then restart and verify the ingest reaches completion without crash.
- runFlow: subflows/launch-and-wait.yaml

# Navigate to Music tab
- tapOn:
    point: "50%,95%"
- extendedWaitUntil:
    visible: "Music"
    timeout: ${TIMEOUT}

# Start first ingest
- tapOn: "Install HVSC"
- extendedWaitUntil:
    visible: "Extracting"
    timeout: ${LONG_TIMEOUT}

- takeScreenshot: hvsc-repeat-extracting-first

# Cancel during extraction
- tapOn: "Cancel"
- extendedWaitUntil:
    visible: "Cancelled"
    timeout: ${TIMEOUT}

- takeScreenshot: hvsc-repeat-cancelled

# Restart ingest
- tapOn: "Install HVSC"
- extendedWaitUntil:
    visible: "Downloading"
    timeout: ${LONG_TIMEOUT}
- extendedWaitUntil:
    visible: "Ready"
    timeout: ${LONG_TIMEOUT}

- takeScreenshot: hvsc-repeat-complete
