appId: uk.gleissner.c64commander
tags:
  - hvsc-perf
  - hvsc-perf-setup
  - device
env:
  LONG_TIMEOUT: ${LONG_TIMEOUT || "180000"}
  SHORT_TIMEOUT: ${SHORT_TIMEOUT || "5000"}
  TIMEOUT: ${TIMEOUT || "30000"}
---
- runFlow: subflows/launch-and-wait.yaml
- retry:
    maxRetries: 3
    commands:
      - tapOn:
          text: "Retry connection"
          optional: true
      - tapOn:
          text: "Save & Retry"
          optional: true
      - tapOn:
          text: "Done"
          optional: true
      - tapOn:
          text: "Play"
      - waitForAnimationToEnd
      - extendedWaitUntil:
          visible: "Playlist"
          timeout: ${TIMEOUT}
# Clear any leftover search filter from previous test runs.
# Scroll down from top to reveal the filter area (below the player controls)
# using safe coordinates that stay above the native tab bar (top at y=2010).
- repeat:
    times: 3
    commands:
      - swipe:
          start: 50%, 70%
          end: 50%, 20%
          duration: 500
          waitToSettleTimeoutMs: 300
      - waitForAnimationToEnd
- tapOn:
    text: "Clear filter"
    optional: true
- waitForAnimationToEnd
# Re-select the Play tab in case the Clear-filter tap hit the tab bar
- tapOn:
    id: "tab-play"
- waitForAnimationToEnd
# Scroll to find HVSC download. Continue from current position — the 3 swipes
# above already moved us partway down. Each retry scrolls one more screenfull.
- retry:
    maxRetries: 15
    commands:
      - swipe:
          start: 50%, 70%
          end: 50%, 20%
          duration: 500
      - waitForAnimationToEnd
      - assertVisible:
          id: "hvsc-download"
- tapOn:
    id: "hvsc-download"
- extendedWaitUntil:
    visible: "Status: Ready"
    timeout: ${LONG_TIMEOUT}
- assertVisible: "HVSC ready"
- runFlow:
    when:
      visible: "Run Ingest HVSC"
    commands:
      - tapOn:
          id: "hvsc-ingest"
      - extendedWaitUntil:
          visible: "Indexed "
          timeout: ${LONG_TIMEOUT}
      - assertVisible: "HVSC ready"
# Scroll back to top so the playlist header is genuinely at a tappable
# screen position; the prior downward scrolls pushed it above the viewport
# but the WebView accessibility tree still reports its DOM bounds at y≈143.
- repeat:
    times: 6
    commands:
      - swipe:
          start: 50%, 24%
          end: 50%, 82%
          duration: 500
          waitToSettleTimeoutMs: 300
      - waitForAnimationToEnd
# After scroll-to-top the add-items button is visible — tap directly
- tapOn:
    id: "add-items-to-playlist"
- extendedWaitUntil:
    visible: "Choose source"
    timeout: ${TIMEOUT}
- retry:
    maxRetries: 6
    commands:
      - tapOn:
          id: "import-option-hvsc"
          optional: true
      - tapOn:
          text: "Add file / folder from HVSC"
          optional: true
      - tapOn:
          text: "HVSC"
          optional: true
      - waitForAnimationToEnd
      - extendedWaitUntil:
          visible: "From HVSC"
          timeout: ${TIMEOUT}
# Navigate to root in case the browser retained a previous position
- tapOn:
    text: "Root"
    optional: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Open DEMOS"
    timeout: ${TIMEOUT}
- tapOn: "Open DEMOS"
- tapOn:
    text: "Filter folders…"
    optional: true
- inputText: "0-9"
- extendedWaitUntil:
    visible: "Open 0-9"
    timeout: ${TIMEOUT}
- tapOn: "Open 0-9"
- extendedWaitUntil:
    visible: "Select 10_Orbyte.sid"
    timeout: ${TIMEOUT}
- tapOn: "Select 10_Orbyte.sid"
- waitForAnimationToEnd
- tapOn: "Add to playlist"
- waitForAnimationToEnd
- extendedWaitUntil:
    notVisible: "From HVSC"
    timeout: ${TIMEOUT}
# Scroll to top so we start from a known position for the playlist assertion
- repeat:
    times: 6
    commands:
      - swipe:
          start: 50%, 24%
          end: 50%, 82%
          duration: 500
          waitToSettleTimeoutMs: 300
      - waitForAnimationToEnd
# Clear any restored filter that hides playlist items
- repeat:
    times: 3
    commands:
      - swipe:
          start: 50%, 70%
          end: 50%, 20%
          duration: 500
          waitToSettleTimeoutMs: 300
      - waitForAnimationToEnd
- tapOn:
    text: "Clear filter"
    optional: true
- waitForAnimationToEnd
# Verify the track is now visible in the playlist
- retry:
    maxRetries: 15
    commands:
      - swipe:
          start: 50%, 70%
          end: 50%, 20%
          duration: 500
      - waitForAnimationToEnd
      - assertVisible: "10_Orbyte.sid"
- assertVisible: "10_Orbyte.sid"
