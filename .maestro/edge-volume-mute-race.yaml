appId: uk.gleissner.c64commander
tags:
  - edge
  - slow
  - device
env:
  LONG_TIMEOUT: ${LONG_TIMEOUT || "20000"}
  SHORT_TIMEOUT: ${SHORT_TIMEOUT || "5000"}
  TIMEOUT: ${TIMEOUT || "15000"}
---
# edge-volume-mute-race: play a SID, sweep the volume slider rapidly, then
# toggle mute/unmute several times, and verify the final state is consistent.
- runFlow: subflows/launch-and-wait.yaml

# Navigate to the Play Files tab
- tapOn:
    point: "75%,95%"
- extendedWaitUntil:
    visible: "Play Files"
    timeout: ${TIMEOUT}

# Assert the playback volume controls are visible (connected + playing assumed in this flow)
- assertVisible: "Playback volume"
- assertVisible: "Mute"

# Rapid slider sweeps: tap far left then far right repeatedly to stress preview coalescing
- repeat:
    times: 6
    commands:
      - tapOn:
          point: "20%,70%"
      - tapOn:
          point: "80%,70%"

# Mute/unmute repeatedly and assert the button label flips each time
- repeat:
    times: 5
    commands:
      - tapOn: "Mute"
      - extendedWaitUntil:
          visible: "Unmute"
          timeout: ${TIMEOUT}
      - tapOn: "Unmute"
      - extendedWaitUntil:
          visible: "Mute"
          timeout: ${TIMEOUT}

# Final state: unmuted and playback volume label visible
- assertNotVisible: "Unmute"
- assertVisible: "Playback volume"
- assertVisible: "Mute"
- takeScreenshot: volume-mute-race-final
