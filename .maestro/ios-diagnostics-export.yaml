appId: uk.gleissner.c64commander
env:
  TIMEOUT: ${TIMEOUT || "15000"}
tags:
  - ios
  - ci-critical-ios
---
- runFlow: subflows/ios-open-settings-tab.yaml
- retry:
    maxRetries: 3
    commands:
      - tapOn:
          text: "Diagnostics"
          optional: true
      - tapOn:
          text: "Open diagnostics"
          optional: true
      - waitForAnimationToEnd
      - extendedWaitUntil:
          visible: "Share All"
          timeout: ${TIMEOUT}
# iOS accessibility exposure for the diagnostics tabs is not stable enough to
# key this flow off a tab label. The dialog title plus the share/clear actions
# are consistently exposed when the diagnostics panel is open.
- assertVisible: "Share All"
- assertVisible: "Clear All"
- assertVisible: "Diagnostics"
- takeScreenshot: ios-diagnostics-export-actions
