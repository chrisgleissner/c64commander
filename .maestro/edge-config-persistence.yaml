appId: uk.gleissner.c64commander
tags:
  - edge
  - slow
env:
  SHORT_TIMEOUT: ${SHORT_TIMEOUT || "5000"}
  TIMEOUT: ${TIMEOUT || "15000"}
  LONG_TIMEOUT: ${LONG_TIMEOUT || "20000"}
---
- runFlow: subflows/launch-and-wait.yaml
- tapOn:
    id: "tab-settings"
- extendedWaitUntil:
    visible: "Settings"
    timeout: ${SHORT_TIMEOUT}
- waitForAnimationToEnd
- swipe:
    start: 50%, 78%
    end: 50%, 28%
    duration: 400
- waitForAnimationToEnd
- tapOn:
    id: feature-flag-hvsc_enabled
    checked: false
    optional: true
- swipe:
    start: 50%, 78%
    end: 50%, 28%
    duration: 400
- waitForAnimationToEnd
- tapOn:
    id: feature-flag-hvsc_enabled
    checked: false
    optional: true
- swipe:
    start: 50%, 78%
    end: 50%, 28%
    duration: 400
- waitForAnimationToEnd
- tapOn:
    id: feature-flag-hvsc_enabled
    checked: false
    optional: true

- tapOn:
    id: "tab-play"
- extendedWaitUntil:
    visible: "Play Files"
    timeout: ${SHORT_TIMEOUT}
- waitForAnimationToEnd
- swipe:
    start: 50%, 86%
    end: 50%, 38%
    duration: 400
- waitForAnimationToEnd
- scrollUntilVisible:
    element: { id: hvsc-download }
    direction: DOWN
    speed: 80
    timeout: ${LONG_TIMEOUT}
    visibilityPercentage: 50
    centerElement: true
- assertVisible:
    id: hvsc-download

- takeScreenshot: hvsc-enabled

# Restart and confirm it persisted.
- launchApp:
    stopApp: true
- runFlow: subflows/launch-and-wait.yaml
- tapOn:
    id: "tab-play"
- extendedWaitUntil:
    visible: "Play Files"
    timeout: ${SHORT_TIMEOUT}
- waitForAnimationToEnd
- swipe:
    start: 50%, 86%
    end: 50%, 38%
    duration: 400
- waitForAnimationToEnd
- scrollUntilVisible:
    element: { id: hvsc-download }
    direction: DOWN
    speed: 80
    timeout: ${LONG_TIMEOUT}
    visibilityPercentage: 50
    centerElement: true
- assertVisible:
    id: hvsc-download
- takeScreenshot: hvsc-persisted
