appId: uk.gleissner.c64commander
tags:
  - edge
  - slow
env:
  SHORT_TIMEOUT: ${SHORT_TIMEOUT || "5000"}
  TIMEOUT: ${TIMEOUT || "15000"}
  LONG_TIMEOUT: ${LONG_TIMEOUT || "20000"}
---
- runFlow: subflows/launch-and-wait.yaml
- tapOn:
    id: "tab-settings"
- extendedWaitUntil:
    visible: "Settings"
    timeout: ${SHORT_TIMEOUT}
- waitForAnimationToEnd
- retry:
    maxRetries: 6
    commands:
      - swipe:
          start: 50%, 78%
          end: 50%, 28%
          duration: 400
      - waitForAnimationToEnd
      - assertVisible: "HVSC downloads"
      - tapOn:
          text: "HVSC downloads"
          checked: false
          optional: true
      - waitForAnimationToEnd
      - assertVisible: "HVSC downloads"

- tapOn:
    id: "tab-play"
- extendedWaitUntil:
    visible: "Play Files"
    timeout: ${SHORT_TIMEOUT}
- waitForAnimationToEnd
- scrollUntilVisible:
    element: { text: "Download HVSC" }
    direction: DOWN
    speed: 80
    timeout: ${LONG_TIMEOUT}
    visibilityPercentage: 50
    centerElement: true
- assertVisible: "Download HVSC"

- takeScreenshot: hvsc-enabled

# Restart and confirm it persisted.
- launchApp:
    stopApp: true
- runFlow: subflows/launch-and-wait.yaml
- tapOn:
    id: "tab-play"
- extendedWaitUntil:
    visible: "Play Files"
    timeout: ${SHORT_TIMEOUT}
- waitForAnimationToEnd
- scrollUntilVisible:
    element: { text: "Download HVSC" }
    direction: DOWN
    speed: 80
    timeout: ${LONG_TIMEOUT}
    visibilityPercentage: 50
    centerElement: true
- assertVisible: "Download HVSC"
- takeScreenshot: hvsc-persisted
