appId: uk.gleissner.c64commander
tags:
  - device
  - slow
  - file-picker
  - android-regression-proof
env:
  FOLDER_NAME: ${FOLDER_NAME || "C64LocalSource"}
  LONG_TIMEOUT: ${LONG_TIMEOUT || "30000"}
  SHORT_TIMEOUT: ${SHORT_TIMEOUT || "5000"}
  TIMEOUT: ${TIMEOUT || "15000"}
---
- runFlow: subflows/launch-and-wait.yaml
- retry:
    maxRetries: 3
    commands:
      - tapOn:
          id: "tab-play"
          optional: true
      - waitForAnimationToEnd
      - extendedWaitUntil:
          visible:
            text: "PLAY FILES"
          timeout: ${TIMEOUT}
- scrollUntilVisible:
    element:
      id: "add-items-to-playlist"
    direction: DOWN
    timeout: ${TIMEOUT}
- retry:
    maxRetries: 3
    commands:
      - tapOn:
          id: "add-items-to-playlist"
      - extendedWaitUntil:
          visible:
            text: "Choose source"
          timeout: ${TIMEOUT}
- scrollUntilVisible:
    element:
      id: "import-option-local"
    direction: DOWN
    timeout: ${TIMEOUT}
- tapOn:
    id: "import-option-local"

- tapOn:
    text: "Allow"
    optional: true
- tapOn:
    text: "Allow access"
    optional: true
- tapOn:
    text: "Allow all the time"
    optional: true

- extendedWaitUntil:
    visible:
      text: "Use this folder"
    timeout: ${SHORT_TIMEOUT}
- runFlow:
    when:
      visible: "Files in C64Music"
    commands:
      - tapOn: "Download"
      - extendedWaitUntil:
          visible: ${FOLDER_NAME}
          timeout: ${SHORT_TIMEOUT}
      - tapOn: ${FOLDER_NAME}
- runFlow:
    when:
      visible: "Files in Download"
    commands:
      - extendedWaitUntil:
          visible: ${FOLDER_NAME}
          timeout: ${SHORT_TIMEOUT}
      - tapOn: ${FOLDER_NAME}
- extendedWaitUntil:
    visible: ${FOLDER_NAME}
    timeout: ${SHORT_TIMEOUT}
- waitForAnimationToEnd
- tapOn: "Use this folder"
- tapOn:
    text: "Allow"
    optional: true

- scrollUntilVisible:
    element: "demo.d64"
    direction: DOWN
    timeout: ${LONG_TIMEOUT}
- assertVisible: "demo.crt"
- scrollUntilVisible:
    element: "demo.prg"
    direction: DOWN
    timeout: ${LONG_TIMEOUT}
- assertNotVisible: "No supported files"
- assertNotVisible: "Add items failed"
- takeScreenshot: local-source-listed
- scrollUntilVisible:
    element: "demo.d64"
    direction: UP
    timeout: ${TIMEOUT}
- takeScreenshot: local-playlist-populated

- tapOn: "Play demo.d64"
- scrollUntilVisible:
    element: "Stop"
    direction: UP
    timeout: ${LONG_TIMEOUT}
- assertNotVisible: "Playback failed"
- takeScreenshot: local-d64-playing
- tapOn: "Stop"

- scrollUntilVisible:
    element: "demo.prg"
    direction: DOWN
    timeout: ${TIMEOUT}
- tapOn: "Play demo.prg"
- scrollUntilVisible:
    element: "Stop"
    direction: UP
    timeout: ${LONG_TIMEOUT}
- assertNotVisible: "Playback failed"
- takeScreenshot: local-prg-playing
- tapOn: "Stop"

- scrollUntilVisible:
    element: "demo.crt"
    direction: DOWN
    timeout: ${TIMEOUT}
- tapOn: "Play demo.crt"
- scrollUntilVisible:
    element: "Stop"
    direction: UP
    timeout: ${LONG_TIMEOUT}
- assertNotVisible: "Playback failed"
- takeScreenshot: local-crt-playing
- tapOn: "Stop"

- tapOn:
    text: "Clear playlist"
    optional: true
- tapOn:
    text: "Clear"
    optional: true
- tapOn:
    text: "Remove"
    optional: true
